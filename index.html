/* ── MÉTRÉS ────────────────────────────────────────────────────────────
   Une seule source de vérité pour les quantités : écran, PDF et registre
   Sheets lisent tous ce calcul.
   UNITÉS DE SAISIE (affichées dans chaque champ de l'appli) :
     Ø carottage ............ mm
     Épaisseur / profondeur . cm
     Longueur sciée, lamelle  m
     Hauteur de voile ....... m
     Ouvertures (L × H) ..... cm   ← les deux types, converties en m² ici
   ──────────────────────────────────────────────────────────────────── */
function metres(blocs){
  var t={niveaux:(blocs||[]).length,
    nbCar:0, mlCar:0,        // carottages : nombre + ml forés (nb × épaisseur)
    mlSci:0, m2Sci:0,        // sciage : ml sciés + m² de coupe (ml × profondeur)
    nbCb:0,  mlCb:0,         // lamelles carbone : nombre + ml posés
    nbOuvCar:0, m2OuvCar:0,  // ouvertures par carottage : nombre + m²
    nbOuvSci:0, m2OuvSci:0}; // ouvertures par sciage : nombre + m²
  var n=function(v){var x=parseFloat(v);return isNaN(x)?0:x;};
  (blocs||[]).forEach(function(b){
    (b.carottages||[]).forEach(function(l){
      t.nbCar+=n(l.nb); t.mlCar+=n(l.nb)*n(l.ep)/100;
    });
    (b.sciages||[]).forEach(function(l){
      t.mlSci+=n(l.ml); t.m2Sci+=n(l.ml)*n(l.prof)/100;
    });
    (b.carbones||[]).forEach(function(l){
      t.nbCb+=n(l.nbl); t.mlCb+=n(l.nbl)*n(l.ll);
    });
    (b.ouvertures||[]).forEach(function(o){
      t.nbOuvCar++; t.m2OuvCar+=(n(o.larg)/100)*(n(o.long)/100); // cm × cm → m²
      (o.carottages||[]).forEach(function(l){t.nbCar+=n(l.nb);t.mlCar+=n(l.nb)*n(l.ep)/100;});
    });
    (b.ouvsciages||[]).forEach(function(o){
      t.nbOuvSci++; t.m2OuvSci+=(n(o.haut)/100)*(n(o.larg)/100); // cm × cm → m²
      (o.coupes||[]).forEach(function(cp){t.mlSci+=n(cp.nb)*n(cp.ml);t.m2Sci+=n(cp.nb)*n(cp.ml)*n(cp.ep)/100;});
      (o.carottages||[]).forEach(function(l){t.nbCar+=n(l.nb);t.mlCar+=n(l.nb)*n(l.ep)/100;});
    });
  });
  ['mlCar','mlSci','m2Sci','mlCb','m2OuvCar','m2OuvSci'].forEach(function(k){
    t[k]=Math.round(t[k]*100)/100;
  });
  return t;
}
// Lignes du récapitulatif, réutilisées par l'écran, le PDF et l'email
function metresLignes(t){
  var r=[];
  if(t.nbCar>0)   r.push(['Carottage',            t.nbCar+' carottage(s)', t.mlCar>0?t.mlCar+' ml forés':'']);
  if(t.mlSci>0)   r.push(['Sciage',               t.mlSci+' ml',           t.m2Sci>0?t.m2Sci+' m² de coupe':'']);
  if(t.nbCb>0)    r.push(['Lamelles carbone',     t.nbCb+' lamelle(s)',    t.mlCb>0?t.mlCb+' ml posés':'']);
  if(t.nbOuvCar>0)r.push(['Ouvertures carottage', t.nbOuvCar+' ouverture(s)', t.m2OuvCar>0?t.m2OuvCar+' m²':'']);
  if(t.nbOuvSci>0)r.push(['Ouvertures sciage',    t.nbOuvSci+' ouverture(s)', t.m2OuvSci>0?t.m2OuvSci+' m²':'']);
  return r;
}

/* ── GÉOLOCALISATION DES PHOTOS ────────────────────────────────────────
   Position capturée au moment de l'ajout des photos et imprimée sous
   chaque cliché (preuve : le bon chantier, le bon jour). Silencieux si
   le chef refuse la permission ou si le GPS ne capte pas (sous-sol).
   ──────────────────────────────────────────────────────────────────── */
var geoCache=null;
function getGeo(){
  return new Promise(function(resolve){
    if(!navigator.geolocation)return resolve(null);
    if(geoCache&&Date.now()-geoCache.at<300000)return resolve(geoCache); // < 5 min : on réutilise
    navigator.geolocation.getCurrentPosition(
      function(p){geoCache={lat:p.coords.latitude,lng:p.coords.longitude,at:Date.now()};resolve(geoCache);},
      function(){resolve(null);},
      {enableHighAccuracy:false,timeout:8000,maximumAge:300000}
    );
  });
}
function geoTxt(p){
  if(!p||!p.at)return '';
  var d=new Date(p.at);
  var s=('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+('0'+d.getHours()).slice(-2)+'h'+('0'+d.getMinutes()).slice(-2);
  if(p.lat&&p.lng)s+='  ·  '+p.lat.toFixed(5)+', '+p.lng.toFixed(5);
  return s;
}

      var cLeger=Object.assign({},JSON.parse(JSON.stringify(c)),{croquis:[]});

/* ── NOUVELLE VISITE ───────────────────────────────────────────────────
   Chantier multi-semaines : on repart du rapport précédent (n°, adresse,
   client, email, chef d'équipe) et on incrémente le n° de visite.
   Les travaux, photos et la signature sont remis à zéro : c'est une
   nouvelle intervention, pas une copie.
   ──────────────────────────────────────────────────────────────────── */
function nouvelleVisite(id){
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  var src=r.fullData.info||{};
  var vis=parseInt(src.visite||1)||1;
  var suivante=vis+1;
  if(!confirm('Nouvelle visite sur le chantier :\n'+(src.addr||'—')+'\n\nN° '+(src.num||'—')+' — visite V'+suivante
    +'\n\nLes informations du chantier sont reprises.\nLes travaux, photos et signature repartent à zéro.'))return;
  S.info={
    date:new Date().toISOString().slice(0,10),
    num:src.num||'',            // même n° de chantier
    visite:String(suivante),    // visite incrémentée
    addr:src.addr||'',
    addr_cp:src.addr_cp||'',
    addr_ville:src.addr_ville||'',
    addr_gps:src.addr_gps||'',
    client:src.client||'',
    tech:src.tech||'',
    date_debut:src.date_debut||'',
    date_fin:'',
    email_client:src.email_client||''
  };
  S.blocs=[];S.photos=[];S.croquis=[];S.resp='';
  S.sig={url:'',name:'',absent:false,at:''};
  S.reserves={has:false,texte:''};
  S.cro={open:false,idx:null,titre:'',url:''};
  S.step=2;histOpen=false;uid=1;
  saveState();R();showHistory();
  alert('✅ Visite V'+suivante+' préparée.\nSaisissez les travaux de cette semaine.');
}
function restoreReport(id){
  if(!confirm('Charger ce rapport ?\nLe rapport en cours sera remplacé.'))return;
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  Object.assign(S.info,r.fullData.info);
  S.blocs=JSON.parse(JSON.stringify(r.fullData.blocs));
  S.sig={name:r.fullData.sig.name,url:r.fullData.sig.url||'',absent:false,at:r.fullData.sig.at||''};
  S.photos=JSON.parse(JSON.stringify(r.fullData.photos||[]));
  S.reserves=(r.fullData.info&&r.fullData.info.reserves)?JSON.parse(JSON.stringify(r.fullData.info.reserves)):{has:false,texte:''};
  S.croquis=(r.fullData.info&&r.fullData.info.croquis)?JSON.parse(JSON.stringify(r.fullData.info.croquis)):[];
  S.resp='';S.step=1;histOpen=false;saveState();R();
  alert('Rapport chargé !');
}
async function regenPDF(id){
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  var respObj=EQUIPE.find(function(e){return e.nom===r.resp;})||{nom:r.resp,email:''};
  try{
    var blob=await buildPDFFromData(r.fullData.info,r.fullData.blocs,r.fullData.sig,r.fullData.photos||[],respObj,r.filename);
    await envoyerParEmail(blob,r.filename,r.fullData.info,respObj);
  }catch(e){alert('Erreur : '+e.message);}
}

/* ══════════════════════════════════════════════════════════════════════
   ADRESSE DU CHANTIER — autocomplétion officielle
   Service de géocodage de la Géoplateforme (Base Adresse Nationale, IGN) :
   gratuit, sans clé API, sans compte de facturation, toute la France.
   (Google Places exigerait une clé visible dans le code source de l'appli
   + une facturation à la session : inutile ici.)
   Hors ligne : le champ reste en saisie libre, rien ne bloque.
   ══════════════════════════════════════════════════════════════════════ */
var GEOCODE_URL='https://data.geopf.fr/geocodage';
var adrTimer=null, adrSugg=[];

function adrChercher(q){
  clearTimeout(adrTimer);
  if(!q||q.trim().length<3||!navigator.onLine){adrCacher();return;}
  adrTimer=setTimeout(function(){
    fetch(GEOCODE_URL+'/search?index=address&autocomplete=1&limit=5&q='+encodeURIComponent(q))
      .then(function(r){return r.json();})
      .then(function(d){adrSugg=(d&&d.features)?d.features:[];adrAfficher();})
      .catch(function(){adrCacher();}); // pas de réseau : saisie libre, silencieux
  },300);
}
function adrAfficher(){
  var el=document.getElementById('adr-list');if(!el)return;
  if(!adrSugg.length){adrCacher();return;}
  el.innerHTML=adrSugg.map(function(f,i){
    var p=f.properties;
    return '<div onclick="adrChoisir('+i+')" style="padding:11px 13px;cursor:pointer;border-bottom:1px solid var(--brd);font-size:14px">'
      +'<div style="font-weight:700;color:var(--text)">'+(p.name||p.label)+'</div>'
      +'<div style="font-size:12px;color:var(--mut);margin-top:1px">'+(p.postcode||'')+' '+(p.city||'')+'</div>'
      +'</div>';
  }).join('');
  el.style.display='block';
}
function adrCacher(){var el=document.getElementById('adr-list');if(el)el.style.display='none';}
function adrChoisir(i){
  var f=adrSugg[i];if(!f)return;
  var p=f.properties,co=f.geometry&&f.geometry.coordinates;
  S.info.addr=p.label;
  S.info.addr_cp=p.postcode||'';
  S.info.addr_ville=p.city||'';
  S.info.addr_gps=co?co[1].toFixed(5)+', '+co[0].toFixed(5):'';
  var inp=document.getElementById('f-addr');if(inp)inp.value=p.label;
  adrCacher();
  var info=document.getElementById('adr-info');
  if(info)info.innerHTML=S.info.addr_gps?'✅ Adresse localisée — '+S.info.addr_gps:'✅ Adresse validée';
  saveState();
}
// Le chef est SUR le chantier : sa position donne l'adresse
async function adrPosition(){
  var btn=document.getElementById('btn-geo');
  var info=document.getElementById('adr-info');
  if(!navigator.onLine){alert('📴 Pas de réseau : impossible de retrouver l\'adresse.\nSaisissez-la à la main.');return;}
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  if(info)info.textContent='Recherche de votre position...';
  var g=null;
  try{
    g=await getGeo();
    if(!g||!g.lat)throw new Error('Position indisponible (GPS coupé, ou vous êtes en sous-sol)');
    var r=await fetch(GEOCODE_URL+'/reverse?index=address&limit=1&lon='+g.lng+'&lat='+g.lat);
    var d=await r.json();
    var f=d&&d.features&&d.features[0];
    if(!f)throw new Error('Aucune adresse connue à cet endroit');
    adrSugg=[f];adrChoisir(0);
  }catch(e){
    // L'adresse n'a pas pu être retrouvée, mais la position, elle, est valable :
    // on la garde, le chef n'a plus qu'à nommer le chantier.
    if(g&&g.lat){
      S.info.addr_gps=g.lat.toFixed(5)+', '+g.lng.toFixed(5);
      if(info)info.innerHTML='📍 Position enregistrée ('+S.info.addr_gps+') — écrivez le nom ou l\'adresse du chantier.';
      saveState();
      alert('⚠️ '+e.message+'\n\nVotre position est enregistrée. Écrivez l\'adresse ou le nom du chantier à la main.');
    }else{
      if(info)info.textContent='Suggestions officielles (Base Adresse Nationale). Vous pouvez aussi écrire librement.';
      alert('⚠️ '+e.message+'\n\nSaisissez l\'adresse à la main.');
    }
  }finally{
    if(btn){btn.textContent='📍';btn.disabled=false;}
  }
}

  });
  (b.sciages||[]).forEach(function(l){
    var sup=l.supp==='plancher'?'<span class="badge bp">Plancher</span>':'<span class="badge bv">Voile</span>';
    var hi=l.supp==='voile'&&l.haut?' ↕'+l.haut+'ml':'';
    rows.push('<div class="work-row"><span class="work-ico">🪚</span><div class="work-txt"><b>'+l.ml+'ml</b>'+(l.prof?' prof.'+l.prof+'cm':'')+hi+' '+sup+protBadges(l)+'</div></div>');

// Contrôles bloquants avant l'envoi
function verifRapport(){
  var c=S.info,m=[];
  if(!c.num||!c.num.trim())m.push('N° de rapport');
  if(!c.addr||!c.addr.trim())m.push('Adresse / Nom du chantier');
  if(!c.tech||!c.tech.trim())m.push('Chef d\'équipe');
  if(!S.blocs.length)m.push('Aucun niveau saisi');
  if(!S.resp)m.push('Responsable du chantier non sélectionné');
  if(S.envoi==='email'&&!S.sig.absent){
    if(!c.email_client)m.push('Email du client');
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(c.email_client))m.push('Email du client invalide');
  }
  if(S.reserves.has&&!(S.reserves.texte||'').trim())m.push('Nature des réserves');
  if(!S.sig.absent&&!S.sig.url)m.push('Signature du client');
  return m;
}

function addPhotos(input){
  var files=Array.from(input.files),rem=10-S.photos.length,toAdd=files.slice(0,rem);
  if(!toAdd.length)return;
  var done=0,total=toAdd.length;
  var geoP=getGeo(); // demandé une fois, appliqué à toutes les photos du lot
  var tagGeo=function(ph){geoP.then(function(g){ph.geo=g?{lat:g.lat,lng:g.lng,at:Date.now()}:{at:Date.now()};});};
  toAdd.forEach(function(f){
    var objUrl=URL.createObjectURL(f);
    var img=new Image();
    img.onload=function(){
      // Le navigateur applique automatiquement la rotation EXIF via drawImage
      // Redimensionnement : côté long limité à PHOTO_MAX px (photo iPhone = 4032px)
      var w=img.naturalWidth,h=img.naturalHeight;
      var ratio=Math.min(1,PHOTO_MAX/Math.max(w,h));
      var cv=document.createElement('canvas');
      cv.width=Math.round(w*ratio);cv.height=Math.round(h*ratio);
      var ctx=cv.getContext('2d');
      ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(objUrl);
      var ph={url:cv.toDataURL('image/jpeg',PHOTO_Q),caption:'',geo:null};
      S.photos.push(ph);tagGeo(ph);
      if(++done===total)R();
    };
    img.onerror=function(){
      // Fallback si createObjectURL échoue
      URL.revokeObjectURL(objUrl);
      var r=new FileReader();
      r.onload=function(e){var ph={url:e.target.result,caption:'',geo:null};S.photos.push(ph);tagGeo(ph);if(++done===total)R();};
      r.readAsDataURL(f);
    };
    img.src=objUrl;
  });
}

function delBloc(id){if(!confirm('Supprimer ce niveau ?'))return;S.blocs=S.blocs.filter(function(x){return x.id!==id;});R();}

function bot(){
  if(S.step===1)return '<div class="bot"><button class="btn btn-p" style="flex:1" onclick="go(2)">Continuer → Saisir les travaux</button></div>';
  if(S.step===2)return '<div class="bot"><button class="btn btn-o btn-sm" onclick="go(1)">← Retour</button><button class="btn btn-y" style="flex:1" onclick="openM()">➕ Ajouter un niveau</button><button class="btn btn-p btn-sm" onclick="go(3)">Valider →</button></div>';
  if(S.step===3)return '<div class="bot"><button class="btn btn-o btn-sm" onclick="go(2)">← Retour</button><button class="btn btn-p" style="flex:1" onclick="go(4)">🔍 Vérifier avant envoi →</button></div>';
  // Étape 4 : dernier écran avant l'envoi
  var bloque=verifRapport().length>0;
  var wa=S.envoi==='whatsapp';
  return '<div class="bot"><button class="btn btn-o btn-sm" onclick="go(3)">← Modifier</button>'
    +'<button class="btn btn-wa" id="btn-gen" style="flex:1;background:'+(bloque?'#94a3b8':(wa?'#16a34a':'#0284c7'))+'" '+(bloque?'disabled':'')+' onclick="generate()">'
    +(bloque?'⚠️ Rapport incomplet':(wa?'💬 Générer & Partager sur WhatsApp':'📧 Générer & Envoyer par email'))
    +'</button></div>';
}

/* ══════════════════════════════════════════════════════════════════════
   SAISIE DES TRAVAUX — un travail à la fois
   Avant : les 5 types de travaux étaient affichés d'un coup dans la même
   fenêtre → un mur à faire défiler sur un téléphone, sur un chantier.
   Maintenant :
     1. La FICHE DU NIVEAU liste ce qui est déjà saisi (cartes cliquables)
     2. Un bouton par type ouvre un FORMULAIRE DÉDIÉ, un seul travail à la fois
     3. « Ajouter et en saisir un autre » pour enchaîner (6 carottages d'affilée)
   Chaque champ affiche son unité. Les unités sont désormais cohérentes :
     Ø mm · nb · épaisseur/profondeur cm · longueurs m · ouvertures cm
   ══════════════════════════════════════════════════════════════════════ */
var TYPES={
  car:   {ico:'🔩', nom:'Carottage',                bg:'#f8fafc', fg:'#334155', neuf:newCar},
  sci:   {ico:'🪚', nom:'Sciage',                   bg:'#f8fafc', fg:'#334155', neuf:newSci},
  cb:    {ico:'🏗️', nom:'Lamelle carbone',          bg:'#f8fafc', fg:'#334155', neuf:newCb},
  ouv:   {ico:'🔲', nom:'Ouverture par carottages', bg:'#ede9fe', fg:'#7c3aed', neuf:newOuv},
  ouvsci:{ico:'🔳', nom:'Ouverture par sciage',     bg:'#dbeafe', fg:'#0284c7', neuf:newOuvSci}
};
var LISTE={car:'carottages',sci:'sciages',cb:'carbones',ouv:'ouvertures',ouvsci:'ouvsciages'};

/* Une ouverture par carottages EST du carottage ; une ouverture par sciage EST
   du sciage. On ne présente donc que 3 métiers, et le choix simple/ouverture se
   fait en haut du formulaire. Les données restent stockées séparément (le métré
   et le PDF distinguent toujours les deux). */
var GROUPES=[
  {cle:'car', ico:'🔩', nom:'Carottage',       sous:'simple ou ouverture', modes:[['car','Carottage simple'],['ouv','Ouverture (trémie)']]},
  {cle:'sci', ico:'🪚', nom:'Sciage',          sous:'coupe ou ouverture',  modes:[['sci','Coupe simple'],['ouvsci','Ouverture (porte, trémie)']]},
  {cle:'cb',  ico:'🏗️', nom:'Lamelle carbone', sous:'renforcement',        modes:[]}
];

function openM(){
  S.m={open:true,editId:null,niveau:'',obs:'',autres:'',
    carottages:[],sciages:[],carbones:[],ouvertures:[],ouvsciages:[],
    vue:'fiche',type:null,idx:null,d:null};
  renderModal();
}
function editBloc(id){
  var b=S.blocs.find(function(x){return x.id===id;});if(!b)return;
  S.m={open:true,editId:id,niveau:b.niveau,obs:b.obs||'',autres:b.autres||'',
    carottages:JSON.parse(JSON.stringify(b.carottages||[])),
    sciages:JSON.parse(JSON.stringify(b.sciages||[])),
    carbones:JSON.parse(JSON.stringify(b.carbones||[])),
    ouvertures:JSON.parse(JSON.stringify(b.ouvertures||[])),
    ouvsciages:JSON.parse(JSON.stringify(b.ouvsciages||[])),
    vue:'fiche',type:null,idx:null,d:null};
  renderModal();
}
function closeM(){S.m.open=false;renderModal();}

// ── Navigation dans la modale ──
function mAdd(type){saveDraft();S.m.type=type;S.m.idx=null;S.m.d=TYPES[type].neuf();S.m.vue='form';renderModal();}
function mEdit(type,i){S.m.type=type;S.m.idx=i;S.m.d=JSON.parse(JSON.stringify(S.m[LISTE[type]][i]));S.m.vue='form';renderModal();}
function mDel(type,i){
  if(!confirm('Supprimer ce '+TYPES[type].nom.toLowerCase()+' ?'))return;
  S.m[LISTE[type]].splice(i,1);renderModal();
}
function mBack(){S.m.vue='fiche';S.m.type=null;S.m.idx=null;S.m.d=null;renderModal();}
function mNotes(){saveDraft();S.m.vue='notes';renderModal();}
// Valider le travail en cours. encore=true → on enchaîne sur un nouveau du même type.
function mValide(encore){
  saveDraft();
  var err=verifTravail(S.m.type,S.m.d);
  if(err){alert('⚠️ '+err);return;}
  var L=S.m[LISTE[S.m.type]];
  if(S.m.idx===null)L.push(S.m.d); else L[S.m.idx]=S.m.d;
  if(encore){
    var t=S.m.type;
    S.m.d=TYPES[t].neuf();S.m.idx=null;
    renderModal();
    var mo=document.getElementById('modal');if(mo)mo.scrollTop=0;
  }else mBack();
}
// Contrôles par type : ce qui est indispensable au métré
function verifTravail(type,d){
  if(!d)return 'Rien à enregistrer.';
  if(type==='car'){
    if(d.diam==='Autre'&&!d.diamCustom)return 'Précisez le diamètre en mm.';
    if(!d.ep)return 'Indiquez l\'épaisseur percée (cm) : elle sert au métré.';
    if(!d.supp)return 'Choisissez Plancher ou Voile.';
  }
  if(type==='sci'){
    if(!d.ml)return 'Indiquez la longueur sciée (m).';
    if(!d.prof)return 'Indiquez la profondeur de coupe (cm) : elle sert au métré.';
    if(!d.supp)return 'Choisissez Plancher ou Voile.';
  }
  if(type==='cb'){
    if(!d.nbl)return 'Indiquez le nombre de lamelles.';
    if(!d.ll)return 'Indiquez la longueur d\'une lamelle (m).';
  }
  if(type==='ouv'){
    if(!d.larg||!d.long)return 'Indiquez les dimensions de l\'ouverture (cm).';
    if(!d.supp)return 'Choisissez Plancher ou Voile.';
  }
  if(type==='ouvsci'){
    if(!d.haut||!d.larg)return 'Indiquez les dimensions de l\'ouverture (cm).';
  }
  return '';
}

// ── Briques de formulaire ──
// Champ chiffré avec son unité collée : plus d'ambiguïté cm/m.
function champ(id,label,unite,val,ph,step){
  return '<div style="flex:1;min-width:110px">'
    +'<label style="display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin-bottom:5px">'+label+'</label>'
    +'<div style="display:flex;align-items:stretch;border:1.5px solid var(--brd);border-radius:9px;background:#fff;overflow:hidden">'
    +'<input id="'+id+'" type="number" inputmode="decimal" value="'+(val||'')+'" placeholder="'+(ph||'')+'" step="'+(step||'any')+'" min="0" style="flex:1;width:100%;border:none;padding:12px;font-size:16px;font-weight:700;outline:none">'
    +'<span style="padding:0 12px;font-size:12px;font-weight:800;color:var(--mut);background:#f1f5f9;display:flex;align-items:center">'+unite+'</span>'
    +'</div></div>';
}
function sousTitre(t){return '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:16px 0 8px">'+t+'</div>';}
// Grille des diamètres : gros boutons, pas un menu déroulant
function grilleDiam(val,custom){
  return '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">'
    +DIAMS.map(function(d){
      var on=String(val)===String(d);
      return '<div data-c="diam:'+d+'" style="cursor:pointer;text-align:center;padding:11px 2px;border-radius:8px;border:2px solid '+(on?'var(--dk)':'var(--brd)')+';background:'+(on?'var(--dk)':'#fff')+';color:'+(on?'var(--y)':'var(--text)')+';font-size:13px;font-weight:800">'+(d==='Autre'?'Autre':d)+'</div>';
    }).join('')
    +'</div>'
    +(val==='Autre'?'<div style="margin-top:8px">'+champ('d-dc','Diamètre exact','mm',custom,'Ex : 450')+'</div>':'');
}
function compteur(val){
  return '<div style="display:flex;align-items:center;gap:0;border:1.5px solid var(--brd);border-radius:9px;overflow:hidden;background:#fff">'
    +'<div data-c="nb-" style="cursor:pointer;padding:12px 20px;font-size:22px;font-weight:900;color:var(--dk);background:#f1f5f9;user-select:none">−</div>'
    +'<input id="d-nb" type="number" inputmode="numeric" min="1" value="'+(val||1)+'" style="flex:1;width:100%;border:none;text-align:center;padding:12px;font-size:18px;font-weight:900;outline:none">'
    +'<div data-c="nb+" style="cursor:pointer;padding:12px 20px;font-size:22px;font-weight:900;color:var(--dk);background:#f1f5f9;user-select:none">+</div>'
    +'</div>';
}
function choixSupport(v){
  return '<div style="display:flex;gap:8px">'
    +['plancher','voile'].map(function(s){
      var on=v===s;
      var col=s==='plancher'?'#92400e':'#0369a1',bg=s==='plancher'?'#fef3c7':'#e0f2fe';
      return '<div data-c="supp:'+s+'" style="flex:1;cursor:pointer;text-align:center;padding:14px 8px;border-radius:10px;border:2px solid '+(on?col:'var(--brd)')+';background:'+(on?bg:'#fff')+';font-size:15px;font-weight:800;color:'+(on?col:'var(--mut)')+'">'
        +(s==='plancher'?'🟫 Plancher':'🧱 Voile')+'</div>';
    }).join('')
    +'</div>';
}
function bascule(champName,on,label,couleur){
  var c=couleur||'#16a34a';
  return '<div data-c="tog:'+champName+'" style="cursor:pointer;display:flex;align-items:center;gap:10px;padding:12px;border-radius:9px;border:2px solid '+(on?c:'var(--brd)')+';background:'+(on?'#f0fdf4':'#fff')+';margin-bottom:7px">'
    +'<div style="width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid '+(on?c:'#cbd5e1')+';background:'+(on?c:'#fff')+';color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center">'+(on?'✓':'')+'</div>'
    +'<div style="font-size:14px;font-weight:700;color:'+(on?'#166534':'var(--mut)')+'">'+label+'</div>'
    +'</div>';
}
// Protections : dépendent du support (un étai n'a pas de sens sur un voile)
function protections(d){
  if(d.supp==='plancher'){
    return sousTitre('Protections & sécurité')
      +bascule('etai',d.etai,'🪵 Mise en place d\'un étai')
      +bascule('cp',d.cp,'🪵 Fermeture contreplaqué (CP)')
      +bascule('polyane',d.polyane,'🛡️ Protection polyane','#0284c7');
  }
  if(d.supp==='voile'){
    return sousTitre('Protections')
      +bascule('polyane',d.polyane,'🛡️ Protection polyane','#0284c7');
  }
  return '';
}
function hauteurVoile(d){
  return d.supp==='voile'?'<div style="margin-top:12px">'+champ('d-haut','Hauteur du voile','m',d.haut,'2.80','0.05')+'</div>':'';
}
function dimSelHtml(val,id,extra){
  return '<select id="'+id+'" '+extra+' style="flex:1;padding:10px;font-size:15px;font-weight:700;border-radius:8px;border:1.5px solid var(--brd)">'
    +DIAMS.map(function(d){return '<option value="'+d+'"'+(val==d?' selected':'')+'>'+(d==='Autre'?'Autre...':d+' mm')+'</option>';}).join('')+'</select>';
}

// ── RÉSUMÉ D'UN TRAVAIL (carte cliquable dans la fiche du niveau) ──
function resumeTravail(type,x){
  if(type==='car')   return '<b>'+(x.nb||1)+' ×</b> '+dLbl(x.diam,x.diamCustom)+(x.ep?' · ép. '+x.ep+' cm':'')+(x.supp?' · '+(x.supp==='plancher'?'Plancher':'Voile'):'');
  if(type==='sci')   return '<b>'+(x.ml||'?')+' m</b>'+(x.prof?' · prof. '+x.prof+' cm':'')+(x.supp?' · '+(x.supp==='plancher'?'Plancher':'Voile'):'');
  if(type==='cb')    return '<b>'+(x.nbl||'?')+' lamelle(s)</b> × '+(x.ll||'?')+' m'+(x.type?' · '+x.type:'')+' · '+(x.ori||'horizontal');
  if(type==='ouv'){
    var n=(x.carottages||[]).reduce(function(a,c){return a+(parseInt(c.nb)||0);},0);
    return '<b>'+(x.larg||'?')+' × '+(x.long||'?')+' cm</b>'+(x.supp?' · '+(x.supp==='plancher'?'Plancher':'Voile'):'')+(n?' · '+n+' carottage(s)':'');
  }
  if(type==='ouvsci'){
    var nc=(x.coupes||[]).filter(function(c){return c.ml;}).length;
    return '<b>'+(x.haut||'?')+' × '+(x.larg||'?')+' cm</b>'+(x.typeOuv?' · '+(x.typeOuv==='porte'?'Porte':'Agrandissement'):'')+(nc?' · '+nc+' coupe(s)':'');
  }
  return '';
}

function renderModal(){
  var m=S.m,ov=document.getElementById('ov');
  ov.className='ov-bg'+(m.open?' show':'');
  var modal=document.getElementById('modal');
  if(!m.open){modal.innerHTML='';return;}
  if(m.vue==='form')      modal.innerHTML=vueForm();
  else if(m.vue==='notes')modal.innerHTML=vueNotes();
  else                    modal.innerHTML=vueFiche();
}

/* ── VUE 1 : LA FICHE DU NIVEAU ──
   Ce qui est déjà saisi + un bouton par type de travail. Rien d'autre. */
function vueFiche(){
  var m=S.m;
  var nTot=0;
  var cartes='';
  Object.keys(TYPES).forEach(function(t){
    var L=m[LISTE[t]]||[];
    nTot+=L.length;
    L.forEach(function(x,i){
      cartes+='<div style="display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px solid var(--brd);border-left:4px solid '+TYPES[t].fg+';border-radius:9px;background:#fff;margin-bottom:7px">'
        +'<div data-c="edit:'+t+':'+i+'" style="flex:1;min-width:0;cursor:pointer">'
        +'<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:'+TYPES[t].fg+'">'+TYPES[t].ico+' '+TYPES[t].nom+'</div>'
        +'<div style="font-size:14px;color:var(--text);margin-top:3px">'+resumeTravail(t,x)+'</div>'
        +protBadges(x)
        +'</div>'
        +'<button data-c="edit:'+t+':'+i+'" style="background:#f1f5f9;border:1px solid var(--brd);border-radius:7px;padding:7px 9px;font-size:14px;cursor:pointer">✏️</button>'
        +'<button data-c="del:'+t+':'+i+'" style="background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;border-radius:7px;padding:7px 9px;font-size:14px;cursor:pointer">🗑</button>'
        +'</div>';
    });
  });

  var boutons='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +GROUPES.map(function(g){
      return '<div data-c="add:'+g.cle+'" style="cursor:pointer;text-align:center;padding:14px 8px;border-radius:10px;border:2px dashed var(--brd);background:#f8fafc">'
        +'<div style="font-size:22px;line-height:1.1">'+g.ico+'</div>'
        +'<div style="font-size:13px;font-weight:800;color:var(--dk);margin-top:4px;line-height:1.25">'+g.nom+'</div>'
        +'<div style="font-size:10px;color:var(--mut);margin-top:2px">'+g.sous+'</div>'
        +'</div>';
    }).join('')
    +'<div data-c="notes" style="cursor:pointer;text-align:center;padding:14px 8px;border-radius:10px;border:2px dashed #94a3b8;background:#f8fafc">'
    +'<div style="font-size:22px;line-height:1.1">📝</div>'
    +'<div style="font-size:12px;font-weight:800;color:var(--mut);margin-top:4px;line-height:1.25">Notes'+((m.autres||m.obs)?' ✅':'')+'</div>'
    +'</div>'
    +'</div>';

  var nivChoisi=!!m.niveau;
  var entete=nivChoisi
    ? '<div style="display:flex;align-items:center;gap:10px;padding:0 14px 12px">'
      +'<div style="background:var(--y);color:var(--dk);border-radius:9px;padding:9px 14px;font-size:17px;font-weight:900">📍 '+m.niveau+'</div>'
      +'<div style="flex:1;font-size:12px;color:var(--mut)">'+(nTot?nTot+' travail'+(nTot>1?'x':'')+' saisi'+(nTot>1?'s':''):'Aucun travail')+'</div>'
      +'<button data-c="niv-chg" style="background:#f1f5f9;border:1px solid var(--brd);border-radius:7px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer">Changer</button>'
      +'</div>'
    : '<div style="padding:0 14px 12px">'
      +'<div style="font-size:13px;font-weight:800;color:var(--dk);margin-bottom:8px">À quel niveau ?</div>'
      +'<div class="ngrid">'+NIVEAUX.map(function(nv){return '<div class="nb" data-c="niv:'+nv+'">'+nv+'</div>';}).join('')+'</div>'
      +'</div>';

  return '<div class="mhandle"></div>'
    +'<div style="padding:0 14px 10px;border-bottom:2px solid var(--y)">'

        +'<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin-bottom:8px">Ajouter un travail</div>'

}

/* ── VUE 2 : LE FORMULAIRE D'UN TRAVAIL ──
   Un seul travail à l'écran, gros champs, unités affichées. */
function vueForm(){
  var m=S.m,t=m.type,d=m.d,T=TYPES[t],corps='';

  // Choix simple / ouverture, en haut du formulaire (masqué en modification :
  // on ne transforme pas un carottage en trémie par erreur)
  var groupe=GROUPES.filter(function(g){return g.modes.some(function(x){return x[0]===t;});})[0];
  var selMode='';
  if(groupe&&groupe.modes.length&&m.idx===null){
    selMode='<div style="display:flex;gap:6px;background:#f1f5f9;padding:4px;border-radius:10px;margin-bottom:4px">'
      +groupe.modes.map(function(md){
        var on=md[0]===t;
        return '<div data-c="mode:'+md[0]+'" style="flex:1;cursor:pointer;text-align:center;padding:10px 6px;border-radius:8px;background:'+(on?'#fff':'transparent')+';border:1.5px solid '+(on?'var(--dk)':'transparent')+';font-size:12px;font-weight:800;color:'+(on?'var(--dk)':'var(--mut)')+'">'+md[1]+'</div>';
      }).join('')
      +'</div>';
  }

  if(t==='car'){
    corps=sousTitre('Diamètre')+grilleDiam(d.diam,d.diamCustom)
      +sousTitre('Combien de carottages ?')+compteur(d.nb)
      +'<div style="margin-top:16px">'+champ('d-ep','Épaisseur percée','cm',d.ep,'20','0.5')+'</div>'
      +sousTitre('Support')+choixSupport(d.supp)+hauteurVoile(d)
      +protections(d);
  }
  else if(t==='sci'){
    corps=sousTitre('Dimensions de la coupe')
      +'<div style="display:flex;gap:9px">'+champ('d-ml','Longueur sciée','m',d.ml,'12.5','0.1')+champ('d-prof','Profondeur','cm',d.prof,'20','0.5')+'</div>'
      +sousTitre('Support')+choixSupport(d.supp)+hauteurVoile(d)
      +protections(d);
  }
  else if(t==='cb'){
    corps=sousTitre('Type de lamelle')
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">'
      +CB_TYPES.map(function(ty){
        var on=d.type===ty;
        return '<div data-c="cbtype:'+ty+'" style="cursor:pointer;text-align:center;padding:12px 4px;border-radius:8px;border:2px solid '+(on?'var(--dk)':'var(--brd)')+';background:'+(on?'var(--dk)':'#fff')+';color:'+(on?'var(--y)':'var(--text)')+';font-size:13px;font-weight:800">'+ty+'</div>';
      }).join('')
      +'</div>'
      +sousTitre('Quantités')

/* ── LECTURE DES CHAMPS AVANT TOUT RE-RENDU ──
   Sans ça, un clic sur un bouton effacerait ce qui vient d'être tapé. */
function saveDraft(){
  var m=S.m;
  function gv(id){var e=document.getElementById(id);return e?e.value:null;}
  var a=gv('m-autres'); if(a!==null)m.autres=a;
  var o=gv('m-obs');    if(o!==null)m.obs=o;
  var d=m.d;
  if(!d||m.vue!=='form')return;
  var v;
  v=gv('d-dc');    if(v!==null)d.diamCustom=v;
  v=gv('d-nb');    if(v!==null)d.nb=Math.max(1,parseInt(v)||1);
  v=gv('d-ep');    if(v!==null)d.ep=v;
  v=gv('d-haut');  if(v!==null)d.haut=v;      // hauteur du voile (m)
  v=gv('d-haut2'); if(v!==null)d.haut=v;      // hauteur de l'ouverture sciage (cm)
  v=gv('d-ml');    if(v!==null)d.ml=v;
  v=gv('d-prof');  if(v!==null)d.prof=v;
  v=gv('d-nbl');   if(v!==null)d.nbl=v;
  v=gv('d-ll');    if(v!==null)d.ll=v;
  v=gv('d-larg');  if(v!==null)d.larg=v;
  v=gv('d-long');  if(v!==null)d.long=v;
  v=gv('d-blocs'); if(v!==null)d.nbBlocs=v;
  (d.carottages||[]).forEach(function(c,i){
    var x;
    x=gv('d-sc-d-'+i);  if(x)c.diam=x;
    x=gv('d-sc-dc-'+i); if(x!==null)c.diamCustom=x;
    x=gv('d-sc-n-'+i);  if(x)c.nb=Math.max(1,parseInt(x)||1);
    x=gv('d-sc-e-'+i);  if(x!==null)c.ep=x;
  });
  (d.coupes||[]).forEach(function(cp,i){
    var x;
    x=gv('d-cp-nb-'+i); if(x!==null)cp.nb=x;
    x=gv('d-cp-ml-'+i); if(x!==null)cp.ml=x;
    x=gv('d-cp-ep-'+i); if(x!==null)cp.ep=x;
  });
}

// ── EVENT DELEGATION ──
function initModalEvents(){
  var modal=document.getElementById('modal');
  var ov=document.getElementById('ov');
  ov.addEventListener('click',function(e){if(e.target===this)closeM();});
  modal.addEventListener('click',function(e){
    var el=e.target.closest('[data-c]');
    if(!el)return;
    e.stopPropagation();
    saveDraft();
    var parts=el.dataset.c.split(':'),c=parts[0],a=parts[1],b=parts[2];
    var d=S.m.d;

    // Fiche du niveau
    if(c==='close'){closeM();return;}
    if(c==='save'){saveBloc();return;}
    if(c==='niv'){S.m.niveau=a;}
    else if(c==='niv-chg'){S.m.niveau='';}
    else if(c==='add'){mAdd(a);return;}
    else if(c==='edit'){mEdit(a,parseInt(b));return;}
    else if(c==='del'){mDel(a,parseInt(b));return;}
    else if(c==='notes'){mNotes();return;}
    // Formulaire
    else if(c==='back'){mBack();return;}
    else if(c==='ok'){mValide(false);return;}
    else if(c==='ok+'){mValide(true);return;}
    // Bascule simple ↔ ouverture : les champs n'ont rien à voir, on repart d'un formulaire neuf
    else if(c==='mode'){
      if(a!==S.m.type){S.m.type=a;S.m.d=TYPES[a].neuf();}
      renderModal();return;
    }
    else if(c==='diam'){d.diam=isNaN(a)?a:parseInt(a);}
    else if(c==='nb+'){d.nb=Math.max(1,(parseInt(d.nb)||1)+1);}
    else if(c==='nb-'){d.nb=Math.max(1,(parseInt(d.nb)||1)-1);}
    else if(c==='supp'){d.supp=a;}
    else if(c==='tog'){d[a]=!d[a];}
    else if(c==='ori'){d.ori=a;}
    else if(c==='cbtype'){d.type=(d.type===a?'':a);}
    else if(c==='typeouv'){d.typeOuv=(d.typeOuv===a?'':a);}
    // Sous-listes (carottages d'une ouverture, coupes)
    else if(c==='sub-add'){(d.carottages=d.carottages||[]).push(S.m.type==='ouv'?newOuvSciCar():newOuvSciCar());}
    else if(c==='sub-del'){d.carottages.splice(parseInt(a),1);}
    else if(c==='sub-nb+'){var k=parseInt(a);d.carottages[k].nb=Math.max(1,(parseInt(d.carottages[k].nb)||1)+1);}
    else if(c==='sub-nb-'){var k2=parseInt(a);d.carottages[k2].nb=Math.max(1,(parseInt(d.carottages[k2].nb)||1)-1);}
    else if(c==='coupe-add'){(d.coupes=d.coupes||[]).push(newCoupe());}
    else if(c==='coupe-del'){d.coupes.splice(parseInt(a),1);}
    renderModal();
  });
  modal.addEventListener('change',function(e){
    var el=e.target;
    if(el.dataset.ch==='sub-diam'){
      saveDraft();
      S.m.d.carottages[parseInt(el.dataset.i)].diam=el.value;
      renderModal();
    }
  });
}

// ── SAVE BLOC ──
function saveBloc(){
  saveDraft();var m=S.m;
  if(!m.niveau){alert('⚠️ Choisissez le niveau (RDC, R+1...).');return;}
  var hasWork=(m.carottages||[]).length>0||(m.sciages||[]).length>0||(m.carbones||[]).length>0
    ||(m.ouvertures||[]).length>0||(m.ouvsciages||[]).length>0||m.autres;
  if(!hasWork){alert('⚠️ Ajoutez au moins un travail à ce niveau.');return;}
  var data={niveau:m.niveau,obs:m.obs,autres:m.autres,
    carottages:JSON.parse(JSON.stringify(m.carottages)),
    sciages:JSON.parse(JSON.stringify(m.sciages)),
    carbones:JSON.parse(JSON.stringify(m.carbones)),
    ouvertures:JSON.parse(JSON.stringify(m.ouvertures)),
    ouvsciages:JSON.parse(JSON.stringify(m.ouvsciages))};
  if(m.editId){var idx=S.blocs.findIndex(function(x){return x.id===m.editId;});if(idx>=0)Object.assign(S.blocs[idx],data);}
  else S.blocs.push(Object.assign({id:String(uid++)},data));
  closeM();R();
}

// ── SIGNATURE ──
function initSig(){
  var cv=document.getElementById('sigc');if(!cv)return;
  sc=cv;sx=cv.getContext('2d');sx.strokeStyle='#1E2D35';sx.lineWidth=3;sx.lineCap='round';sx.lineJoin='round';
  if(S.sig.url){var img=new Image();img.onload=function(){sx.drawImage(img,0,0,cv.width,cv.height);};img.src=S.sig.url;}
  function pos(e){var r=cv.getBoundingClientRect(),sw=cv.width/r.width,sh=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sw,y:(s.clientY-r.top)*sh};}
  cv.addEventListener('mousedown',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);});
  cv.addEventListener('mousemove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();});
  cv.addEventListener('mouseup',function(){drawing=false;if(sc){S.sig.url=sc.toDataURL();S.sig.at=new Date().toISOString();}});
  cv.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);},{passive:false});
  cv.addEventListener('touchmove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();},{passive:false});
  cv.addEventListener('touchend',function(){drawing=false;if(sc){S.sig.url=sc.toDataURL();S.sig.at=new Date().toISOString();}});
}
function clearSig(){if(sc&&sx){sx.clearRect(0,0,sc.width,sc.height);S.sig.url='';S.sig.at='';}}

  var vide=!cundo.length&&!S.cro.url;

  var url=cc.toDataURL('image/jpeg',0.8);
  var k={id:Date.now(),titre:titre||('Croquis '+(S.croquis.length+1)),url:url};
  if(S.cro.idx!==null&&S.croquis[S.cro.idx])S.croquis[S.cro.idx]=Object.assign(S.croquis[S.cro.idx],{titre:k.titre,url:k.url});

}
function initCro(){
  var cv=document.getElementById('cro-canvas');if(!cv)return;
  cc=cv;cx=cv.getContext('2d');
  cx.fillStyle='#fff';cx.fillRect(0,0,cv.width,cv.height);
  // Papier quadrillé : aide à dessiner droit et à donner l'échelle
  cx.strokeStyle='#e2e8f0';cx.lineWidth=1;
  for(var gx=40;gx<cv.width;gx+=40){cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx,cv.height);cx.stroke();}
  for(var gy=40;gy<cv.height;gy+=40){cx.beginPath();cx.moveTo(0,gy);cx.lineTo(cv.width,gy);cx.stroke();}
  cx.strokeStyle='#1E2D35';cx.lineWidth=3;cx.lineCap='round';cx.lineJoin='round';
  if(S.cro.url){var img=new Image();img.onload=function(){cx.drawImage(img,0,0,cv.width,cv.height);};img.src=S.cro.url;}
  function pos(e){var r=cv.getBoundingClientRect(),sw=cv.width/r.width,sh=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sw,y:(s.clientY-r.top)*sh};}
  function debut(e){e.preventDefault();cundo.push(cx.getImageData(0,0,cv.width,cv.height));if(cundo.length>12)cundo.shift();cdraw=true;var p=pos(e);cx.beginPath();cx.moveTo(p.x,p.y);}
  function trace(e){if(!cdraw)return;e.preventDefault();var p=pos(e);cx.lineTo(p.x,p.y);cx.stroke();}
  function fin(){cdraw=false;}
  cv.addEventListener('mousedown',debut);cv.addEventListener('mousemove',trace);cv.addEventListener('mouseup',fin);cv.addEventListener('mouseleave',fin);
  cv.addEventListener('touchstart',debut,{passive:false});cv.addEventListener('touchmove',trace,{passive:false});cv.addEventListener('touchend',fin);
}
function croAnnulerTrait(){
  if(!cx||!cundo.length)return;
  cx.putImageData(cundo.pop(),0,0);
}
function croEffacer(){
  if(!cc||!cx)return;
  if(!confirm('Effacer tout le croquis ?'))return;
  S.cro.url='';cundo=[];initCro();
}

/* ── RÉSERVE DE NUMÉROS ────────────────────────────────────────────────
   Le compteur est centralisé sur le serveur : sans réseau, impossible
   d'obtenir un numéro. On en met donc RESERVE_CIBLE d'avance de côté
   dès qu'il y a du réseau. Le bouton 🔢 Auto pioche dans cette réserve
   et fonctionne donc même en sous-sol.
   Note : un numéro réservé mais non utilisé laisse un trou dans le
   registre — c'est normal et sans conséquence.
   ──────────────────────────────────────────────────────────────────── */
var RESERVE_CIBLE=3, refilling=false;
function reserveGet(){try{return JSON.parse(localStorage.getItem('cb_num_reserve')||'[]');}catch(e){return [];}}
function reserveSet(a){try{localStorage.setItem('cb_num_reserve',JSON.stringify(a));}catch(e){}}
async function refillReserve(){
  if(refilling||!navigator.onLine)return;
  var r=reserveGet();
  var manque=RESERVE_CIBLE-r.length;
  if(manque<=0)return;
  refilling=true;
  try{
    var res=await fetch(APPS_SCRIPT_URL+'?action=nextNum&count='+manque+'&token='+encodeURIComponent(APP_TOKEN));
    var data=await res.json();
    if(data&&data.ok){
      var nums=data.nums||(data.num?[data.num]:[]);
      reserveSet(reserveGet().concat(nums));
    }
  }catch(e){/* pas de réseau : on retentera */}
  finally{refilling=false;}
}
async function getNumAuto(){
  var btn=document.getElementById('btn-num');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try{
    var r=reserveGet();
    if(!r.length){
      if(!navigator.onLine){
        alert('📴 Pas de réseau et aucun numéro en réserve.\n\n➡️ Saisissez le N° à la main pour l\'instant, ou reconnectez-vous quelques secondes : l\'appli met 3 numéros de côté pour les prochains chantiers hors ligne.');
        return;
      }
      await refillReserve();
      r=reserveGet();
      if(!r.length){alert('⚠️ Impossible de générer le numéro.\nVérifiez votre connexion internet.');return;}
    }
    var num=r.shift();
    reserveSet(r);
    S.info.num=num;
    var el=document.getElementById('f-num');
    if(el)el.value=num;
    refillReserve(); // on recomplète la réserve en arrière-plan
  }finally{
    if(btn){btn.textContent='🔢 Auto';btn.disabled=false;}
  }
}

      doc.setTextColor(DRK[0],DRK[1],DRK[2]);
      doc.text(row[0],xC1,y+7.5);
      // Niveaux (colonne 2, normal, gris)
      doc.setFontSize(8);doc.setFont('helvetica','normal');
      doc.setTextColor(GRY[0],GRY[1],GRY[2]);
      doc.text(row[1],xC2,y+7.5);
      // Quantité (colonne 3, bold, droite, sombre)
      doc.setFontSize(9.5);doc.setFont('helvetica','bold');
      doc.setTextColor(DRK[0],DRK[1],DRK[2]);

    });
    // ── Fermeture : barre jaune + 4 lignes de bordure ──
    doc.setFillColor(YEL[0],YEL[1],YEL[2]);doc.rect(M,y,tableW,2.5,'F');

    doc.setDrawColor(140,160,175);doc.setLineWidth(0.8);

    doc.setLineWidth(0.2);doc.setDrawColor(BRD[0],BRD[1],BRD[2]);
    y+=8;
  }

  // Photos
  if(photos.length>0){
    doc.addPage();y=15;secTitle('PHOTOS DU CHANTIER');
    var iw2=(PW-2*M-5)/2,ih=iw2*0.7,col=0;
    for(var pi=0;pi<photos.length;pi++){

        doc.setDrawColor(BRD[0],BRD[1],BRD[2]);doc.setLineWidth(0.3);doc.line(px,y,px+iw2,y);doc.line(px,y+ih,px+iw2,y+ih);doc.line(px,y,px,y+ih);doc.line(px+iw2,y,px+iw2,y+ih);
        if(photos[pi].caption){doc.setFillColor(LGT[0],LGT[1],LGT[2]);doc.rect(px,y+ih-6,iw2,6,'F');doc.setFontSize(7);doc.setTextColor(DRK[0],DRK[1],DRK[2]);doc.text(photos[pi].caption.substring(0,40),px+2,y+ih-1.5);}
        // Horodatage + coordonnées GPS : preuve du bon chantier, au bon moment
        var gt=geoTxt(photos[pi].geo);
        if(gt){
          doc.setFillColor(30,45,53);doc.rect(px,y,iw2,4.6,'F');
          doc.setFontSize(5.6);doc.setFont('helvetica','normal');doc.setTextColor(245,196,0);
          doc.text(gt,px+2,y+3.2);
        }
      }catch(e){}
      col++;if(col>=2){col=0;y+=ih+8;}
    }
    if(col>0)y+=ih+8;y+=4;
  }

  // ── CROQUIS ──
  var CRO=(c.croquis||[]);
  if(CRO.length){
    doc.addPage();y=15;secTitle('CROQUIS');
    var cw=PW-2*M, chh=cw*1.15; // ratio du canvas de dessin
    CRO.forEach(function(k){
      if(y+chh+14>PH-20){doc.addPage();y=15;}
      doc.setFillColor(DRK[0],DRK[1],DRK[2]);doc.rect(M,y,cw,8,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(YEL[0],YEL[1],YEL[2]);
      doc.text((k.titre||'Croquis').substring(0,70),M+4,y+5.6);
      y+=8;
      try{doc.addImage(k.url,'JPEG',M,y,cw,chh);}catch(e){}
      doc.setDrawColor(BRD[0],BRD[1],BRD[2]);doc.setLineWidth(0.3);
      doc.rect(M,y,cw,chh,'S');
      y+=chh+10;
    });
  }

  // ── RÉSERVES DU CLIENT ──
  // Un rapport signé vaut PV de réception : les réserves doivent être écrites,
  // en évidence, juste avant la signature.
  var RES=(c.reserves&&c.reserves.has&&(c.reserves.texte||'').trim())?c.reserves.texte.trim():'';
  if(RES){
    var resLines=doc.splitTextToSize(RES,PW-2*M-14);
    var resH=16+resLines.length*5+4;
    if(y+resH>PH-30){doc.addPage();y=15;}
    secTitle('RÉSERVES ÉMISES PAR LE CLIENT');
    doc.setFillColor(255,247,237);doc.setDrawColor(249,115,22);doc.setLineWidth(0.5);
    doc.roundedRect(M,y,PW-2*M,resH,1,1,'FD');
    doc.setFillColor(249,115,22);doc.rect(M,y,3.5,resH,'F');
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(154,52,18);
    doc.text('Le client accepte les travaux SOUS RESERVE(S) :',M+8,y+8);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(60,30,10);
    resLines.forEach(function(l,i){doc.text(l,M+8,y+15+i*5);});
    doc.setLineWidth(0.2);doc.setDrawColor(BRD[0],BRD[1],BRD[2]);
    y+=resH+6;
  }else if(!sig.absent){
    if(y+12>PH-30){doc.addPage();y=15;}
    doc.setFillColor(240,253,244);doc.setDrawColor(134,239,172);doc.setLineWidth(0.4);
    doc.roundedRect(M,y,PW-2*M,10,1,1,'FD');
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(22,101,52);
    doc.text('Travaux acceptes SANS RESERVE par le client.',M+6,y+6.5);
    doc.setLineWidth(0.2);doc.setDrawColor(BRD[0],BRD[1],BRD[2]);
    y+=14;
  }

  // ── SIGNATURE & VALIDATION ──
  if(y>PH-72){doc.addPage();y=15;}
  secTitle(sig.absent?'RAPPORT SANS SIGNATURE CLIENT':(RES?'VALIDATION CLIENT — ACCORD AVEC RESERVES':'VALIDATION CLIENT — BON POUR ACCORD'));
  var sigW=(PW-2*M-5)/2;
  // Bloc gauche : signature client OU mention absent
  if(sig.absent){
    // Bloc "CLIENT ABSENT"
    set(WHT,BRD);doc.roundedRect(M,y,sigW,62,1,1,'FD');
    // En-tête orange/ambre
    doc.setFillColor(245,158,11);doc.roundedRect(M,y,sigW,11,1,1,'F');
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('CLIENT ABSENT',M+sigW/2,y+7.5,{align:'center'});
    // Icône et texte
    doc.setFontSize(22);doc.setTextColor(245,158,11);
    doc.text('!',M+sigW/2,y+28,{align:'center'});
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(DRK[0],DRK[1],DRK[2]);
    doc.text('Signature impossible',M+sigW/2,y+38,{align:'center'});
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(GRY[0],GRY[1],GRY[2]);
    var absLines=['Le client était absent lors de','l\'intervention. Ce rapport est','transmis sans signature client.'];
    absLines.forEach(function(l,i){doc.text(l,M+sigW/2,y+46+i*5,{align:'center'});});
    doc.text('Date : '+fd(c.date),M+sigW/2,y+62-4,{align:'center'});
  }else{
    // Bloc normal
    set(WHT,BRD);doc.roundedRect(M,y,sigW,62,1,1,'FD');
    set(DRK);doc.roundedRect(M,y,sigW,11,1,1,'F');
    doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,WHT);
    doc.text('SIGNATURE CLIENT',M+sigW/2,y+7.5,{align:'center'});
    doc.setFontSize(9);doc.setFont('helvetica','bold');set(null,null,DRK);
    doc.text(sig.name||'—',M+sigW/2,y+20,{align:'center'});
    doc.setFontSize(7);doc.setFont('helvetica','normal');set(null,null,GRY);
    doc.text(RES?'Lu et approuvé — Accord SOUS RÉSERVES':'Lu et approuvé — Bon pour accord',M+sigW/2,y+26,{align:'center'});
    if(sig.url){
      try{doc.addImage(sig.url,'PNG',M+sigW/2-20,y+29,40,20);}catch(e){}
    }else{
      set(null,BRD);doc.setLineDashPattern([1.5,1.5],0);
      doc.rect(M+8,y+29,sigW-16,20,'S');
      doc.setLineDashPattern([],0);
      doc.setFontSize(7);set(null,null,[200,210,215]);
      doc.text('Signature',M+sigW/2,y+41,{align:'center'});
    }
    // Horodatage de la signature : une signature sans date a une faible valeur probante
    doc.setFontSize(8);doc.setFont('helvetica','normal');set(null,null,GRY);
    var sAt=sig.at?new Date(sig.at):null;
    var sTxt=sAt&&!isNaN(sAt)
      ? 'Signé le '+('0'+sAt.getDate()).slice(-2)+'/'+('0'+(sAt.getMonth()+1)).slice(-2)+'/'+sAt.getFullYear()
        +' à '+('0'+sAt.getHours()).slice(-2)+'h'+('0'+sAt.getMinutes()).slice(-2)
      : 'Date : '+fd(c.date);
    doc.text(sTxt,M+sigW/2,y+56,{align:'center'});
  }
  // Bloc droit : bon pour accord
  var rx=M+sigW+5;
  set(WHT,BRD);doc.roundedRect(rx,y,sigW,62,1,1,'FD');
  set(YEL);doc.roundedRect(rx,y,sigW,11,1,1,'F');
  doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,DRK);
  doc.text('BON POUR ACCORD',rx+sigW/2,y+7.5,{align:'center'});
  doc.setFontSize(8);doc.setFont('helvetica','normal');set(null,null,DRK);
  doc.text('Bon pour accord des travaux réalisés',rx+sigW/2,y+19,{align:'center'});
  doc.text('à notre entière satisfaction.',rx+sigW/2,y+25,{align:'center'});
  set(LGT,BRD);doc.roundedRect(rx+6,y+30,sigW-12,24,.5,.5,'FD');
  doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,DRK);
  doc.text("CHOK'BETON",rx+sigW/2,y+39,{align:'center'});
  doc.setFontSize(7);doc.setFont('helvetica','normal');set(null,null,GRY);
  doc.text('1 Rue Hector Berlioz',rx+sigW/2,y+45,{align:'center'});
  doc.text('95210 SAINT GRATIEN',rx+sigW/2,y+50,{align:'center'});
  doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,DRK);
  doc.text('Responsable : '+resp.nom,rx+sigW/2,y+58,{align:'center'});

  var total=doc.getNumberOfPages();var now=new Date();
  for(var p=1;p<=total;p++){
    doc.setPage(p);
    // Barre jaune de séparation
    set(YEL);doc.rect(0,PH-16,PW,1.5,'F');
    // Fond sombre footer
    set(DRK);doc.rect(0,PH-14.5,PW,14.5,'F');
    // Barre jaune verticale gauche
    set(YEL);doc.rect(0,PH-14.5,3,14.5,'F');
    // Nom société en jaune
    doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,YEL);
    doc.text("CHOK'BETON",M+2,PH-7.5);
    // Adresse en gris clair
    doc.setFontSize(6.5);doc.setFont('helvetica','normal');set(null,null,[180,195,200]);
    doc.text('1 Rue Hector Berlioz  |  95210 SAINT GRATIEN',M+2,PH-3);
    // Numéro de rapport + responsable centré
    doc.setFontSize(6.5);set(null,null,[180,195,200]);
    doc.text('N '+String(c.numComplet||c.num||'—')+'  |  Resp. '+resp.nom+'  |  Généré le '+now.toLocaleDateString('fr-FR'),PW/2,PH-7.5,{align:'center'});
    // Pagination à droite en jaune
    doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,YEL);
    doc.text('Page '+p+'/'+total,PW-M,PH-7.5,{align:'right'});
    doc.setFontSize(6);doc.setFont('helvetica','normal');set(null,null,[180,195,200]);
    doc.text('RAPPORT CONFIDENTIEL',PW-M,PH-3,{align:'right'});
  }

  return doc.output('blob');
}

/* ══════════════════════════════════════════════════════════════════════
   FILE D'ATTENTE HORS LIGNE
   Sur chantier (sous-sol, zone blanche), le réseau tombe. Tout rapport
   généré est d'abord ENREGISTRÉ dans IndexedDB (le PDF est stocké tel
   quel, pas en base64 : localStorage exploserait à 5 Mo), puis envoyé.
   S'il n'y a pas de réseau, il reste en file et repart tout seul :
   au retour du réseau, à la réouverture de l'appli, et toutes les 60 s.
   Rien n'est jamais perdu, et rien n'est envoyé deux fois.
   ══════════════════════════════════════════════════════════════════════ */
var DB_NAME='chokbeton',DB_STORE='queue',DB_VER=1;
var flushing=false,queueCount=0,queuePanelOpen=false;

function idb(){
  return new Promise(function(resolve,reject){
    var rq=indexedDB.open(DB_NAME,DB_VER);
    rq.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains(DB_STORE))db.createObjectStore(DB_STORE,{keyPath:'id'});
    };
    rq.onsuccess=function(){resolve(rq.result);};
    rq.onerror=function(){reject(rq.error||new Error('IndexedDB indisponible'));};
  });
}
function idbTx(mode,fn){
  return idb().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(DB_STORE,mode),st=tx.objectStore(DB_STORE),out;
      out=fn(st);
      tx.oncomplete=function(){resolve(out&&out.result!==undefined?out.result:out);};
      tx.onerror=function(){reject(tx.error);};
      tx.onabort=function(){reject(tx.error||new Error('Transaction annulée'));};
    });
  });
}
function qAdd(item){return idbTx('readwrite',function(st){return st.add(item);});}
function qPut(item){return idbTx('readwrite',function(st){return st.put(item);});}
function qDel(id){return idbTx('readwrite',function(st){return st.delete(id);});}
function qAll(){
  return idbTx('readonly',function(st){return st.getAll();}).then(function(list){
    return (list||[]).sort(function(a,b){return a.createdAt-b.createdAt;}); // FIFO
  }).catch(function(){return [];});
}
function qGet(id){return idbTx('readonly',function(st){return st.get(id);});}

// ── ENVOI D'UN ÉLÉMENT DE LA FILE ──
async function sendItem(item){
  var base64=await new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(){resolve(reader.result.split(',')[1]);};
    reader.onerror=function(){reject(new Error('Lecture du PDF impossible'));};
    reader.readAsDataURL(item.blob);
  });
  // msgId : identifiant unique du rapport. Si le réseau coupe après l'envoi mais
  // avant la réponse, le serveur reconnaît le renvoi et n'envoie pas 2 fois.
  var payload=Object.assign({token:APP_TOKEN,msgId:item.id,pdf:base64,filename:item.filename},item.meta);
  var res=await fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });
  if(!res.ok)throw new Error('Serveur injoignable (HTTP '+res.status+')');
  var out=await res.json();
  if(!out||out.success!==true)throw new Error(out&&out.error?out.error:'Envoi refusé par le serveur');
  return true;
}

// ── VIDAGE DE LA FILE (FIFO, on s'arrête à la 1re erreur réseau) ──
async function flushQueue(silencieux){
  if(flushing)return {envoyes:0,restants:queueCount};
  var items=await qAll();
  if(!items.length){queueCount=0;renderQueue();return {envoyes:0,restants:0};}
  if(!navigator.onLine){queueCount=items.length;renderQueue();return {envoyes:0,restants:items.length};}

  flushing=true;renderQueue();
  var envoyes=0;
  try{
    for(var i=0;i<items.length;i++){
      var it=items[i];
      try{
        await sendItem(it);
        await qDel(it.id);
        envoyes++;
      }catch(err){
        it.tries=(it.tries||0)+1;
        it.lastError=err.message;
        it.lastTry=Date.now();
        try{await qPut(it);}catch(e){}
        break; // réseau/serveur KO : inutile d'insister sur les suivants
      }
    }
  }finally{
    flushing=false;
  }
  var reste=await qAll();
  queueCount=reste.length;
  renderQueue();
  if(envoyes>0&&!silencieux){
    alert('✅ '+envoyes+' rapport'+(envoyes>1?'s':'')+' en attente '+(envoyes>1?'ont':'a')+' été envoyé'+(envoyes>1?'s':'')+' avec succès.');
  }
  return {envoyes:envoyes,restants:reste.length};
}

// ── BANDEAU + PANNEAU DE LA FILE ──
function renderQueue(){
  var bar=document.getElementById('qbar');if(!bar)return;
  var offline=!navigator.onLine;
  if(!queueCount&&!offline){bar.innerHTML='';return;}

  var msg,bg,bd,fg;
  if(queueCount){
    bg='#fffbeb';bd='#fcd34d';fg='#92400e';
    msg='⏳ <b>'+queueCount+' rapport'+(queueCount>1?'s':'')+' en attente d\'envoi</b>'
      +(offline?' — 📴 hors ligne, envoi automatique au retour du réseau'
               :(flushing?' — envoi en cours…':' — sera renvoyé automatiquement'));
  }else{
    bg='#f1f5f9';bd='#cbd5e1';fg='#475569';
    msg='📴 <b>Hors ligne</b> — vous pouvez continuer, les rapports partiront au retour du réseau';
  }
  bar.innerHTML='<div style="background:'+bg+';border-bottom:1px solid '+bd+';color:'+fg
    +';padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
    +'<div style="flex:1;min-width:180px;line-height:1.4">'+msg+'</div>'
    +(queueCount?'<button onclick="toggleQueuePanel()" style="background:#fff;border:1px solid '+bd+';color:'+fg+';border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer">'+(queuePanelOpen?'Masquer':'Détail')+'</button>':'')
    +(queueCount&&!offline&&!flushing?'<button onclick="flushQueue()" style="background:var(--dk);border:none;color:var(--y);border-radius:6px;padding:4px 9px;font-size:11px;font-weight:800;cursor:pointer">↻ Envoyer</button>':'')
    +'</div>'
    +(queuePanelOpen?'<div id="qlist" style="background:#fff;border-bottom:1px solid '+bd+'"></div>':'');
  if(queuePanelOpen)renderQueueList();
}
function toggleQueuePanel(){queuePanelOpen=!queuePanelOpen;renderQueue();}
async function renderQueueList(){
  var el=document.getElementById('qlist');if(!el)return;
  var items=await qAll();
  if(!items.length){el.innerHTML='';return;}
  el.innerHTML=items.map(function(it){
    var d=new Date(it.createdAt);
    var hh=('0'+d.getHours()).slice(-2)+'h'+('0'+d.getMinutes()).slice(-2);
    return '<div style="padding:9px 12px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:12px;font-weight:800;color:var(--text)">N° '+(it.meta.num||'—')+' — '+(it.meta.addr||'—')+'</div>'
      +'<div style="font-size:10px;color:var(--mut);margin-top:2px">Créé à '+hh+' · '+(it.tries||0)+' tentative'+((it.tries||0)>1?'s':'')
      +(it.lastError?' · <span style="color:#b91c1c">'+it.lastError+'</span>':'')+'</div>'
      +'</div>'
      +'<button onclick="queueSendOne('+it.id+')" title="Renvoyer" style="background:var(--dk);border:none;color:var(--y);border-radius:6px;padding:5px 8px;font-size:11px;font-weight:800;cursor:pointer">↻</button>'
      +'<button onclick="queueMailManuel('+it.id+')" title="Envoyer depuis l\'app Mail" style="background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1;border-radius:6px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer">📎</button>'
      +'<button onclick="queueDelete('+it.id+')" title="Supprimer de la file" style="background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;border-radius:6px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer">🗑</button>'
      +'</div>';
  }).join('');
}
async function queueSendOne(id){
  if(!navigator.onLine){alert('📴 Pas de réseau.\nLe rapport partira automatiquement dès que le téléphone captera.');return;}
  var it=await qGet(id);if(!it)return;
  try{
    await sendItem(it);
    await qDel(id);
    queueCount=(await qAll()).length;renderQueue();
    alert('✅ Rapport N° '+(it.meta.num||'—')+' envoyé.');
  }catch(err){
    it.tries=(it.tries||0)+1;it.lastError=err.message;it.lastTry=Date.now();
    try{await qPut(it);}catch(e){}
    renderQueue();
    alert('❌ Envoi impossible : '+err.message);
  }
}
async function queueDelete(id){
  var it=await qGet(id);if(!it)return;
  if(!confirm('Supprimer définitivement le rapport N° '+(it.meta.num||'—')+' de la file ?\n\n⚠️ Il ne sera JAMAIS envoyé au client.'))return;
  await qDel(id);
  queueCount=(await qAll()).length;renderQueue();
}
// Envoi manuel via l'app Mail du téléphone (le mail partira au retour du réseau).
// On retire alors le rapport de la file pour éviter un double envoi.
async function queueMailManuel(id){
  var it=await qGet(id);if(!it)return;
  if(!confirm('Envoyer le rapport N° '+(it.meta.num||'—')+' depuis votre application mail ?\n\nIl sera retiré de la file d\'attente (pas de double envoi), mais il ne sera PAS archivé dans Drive ni dans le registre.'))return;
  _fallbackEmail(it.blob,it.filename,it.meta.to,it.meta.cc,it.meta.subject,it.meta.body);
  await qDel(id);
  queueCount=(await qAll()).length;renderQueue();
}

/* ── PARTAGE NATIF (WhatsApp) ──────────────────────────────────────────
   WhatsApp n'accepte pas de pièce jointe via un lien : on passe par la
   fenêtre de partage du téléphone, qui transmet le vrai fichier PDF.
   Doit être appelé juste après un geste de l'utilisateur (sinon iOS refuse).
   ──────────────────────────────────────────────────────────────────── */
function telechargerPDF(blob,filename){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
}
async function partagerPDF(blob,filename,c){
  try{
    var file=new File([blob],filename,{type:'application/pdf'});
    if(!navigator.canShare||!navigator.canShare({files:[file]}))throw new Error('non-supporte');
    await navigator.share({
      files:[file],
      title:'Rapport CHOK BETON — N° '+(c.numComplet||c.num||''),
      text:'Bonjour, voici le rapport de chantier CHOK BETON.\n'
        +'N° '+(c.numComplet||c.num||'-')+' — '+(c.addr||'-')
    });
    return true;
  }catch(e){
    if(e&&e.name==='AbortError'){
      alert('Partage annulé.\n\nLe rapport reste disponible dans 📋 Historique → 📄 Renvoyer.');
      return false;
    }
    // Ordinateur ou navigateur sans partage de fichier → téléchargement
    telechargerPDF(blob,filename);
    alert('📎 Le partage direct n\'est pas disponible sur cet appareil.\nLe PDF a été téléchargé : envoyez-le manuellement depuis WhatsApp.');
    return false;
  }
}

// ── MISE EN FILE + TENTATIVE D'ENVOI IMMÉDIATE ──
async function envoyerParEmail(blob,filename,c,resp){
  var wa=(c.envoi==='whatsapp');
  var emailClient=c.email_client||'';
  var emailResp=resp.email||'';
  var fd=function(d){if(!d)return'-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];};
  var subject=(wa?'[WhatsApp] ':'')+"Rapport CHOK BETON - N "+(c.num||'-')+" - "+(c.addr||'-');
  var t=metres(S.blocs);
  var res=(c.reserves&&c.reserves.has&&(c.reserves.texte||'').trim())?c.reserves.texte.trim():'';
  var corps=(wa
      ? "Rapport transmis au client par WhatsApp.\nCopie pour archivage.\n\n"
      : "Bonjour,\n\nVeuillez trouver ci-joint le rapport de chantier CHOK BETON.\n\n")
    +"Chantier : "+(c.addr||'-')+"\n"
    +"Date : "+fd(c.date)+"\n"
    +"N de rapport : "+(c.numComplet||c.num||'-')+"\n"
    +"Chef d'equipe : "+(c.tech||'-')+"\n"
    +(c.client?"Client : "+c.client+"\n":"")
    +(res?"\nRESERVES DU CLIENT : "+res+"\n":"")+"\n"
    +"Cordialement,\nL'equipe CHOK BETON\n"
    +"1 Rue Hector Berlioz - 95210 SAINT GRATIEN";

  var clientAbsent=S.sig&&S.sig.absent;
  // WhatsApp : le client reçoit le PDF par partage, le serveur n'envoie qu'au responsable
  var emailTo=wa?emailResp:((!clientAbsent&&emailClient)?emailClient:emailResp);
  var emailCc=wa?'':((!clientAbsent&&emailClient)?emailResp:'');

  // Garde-fou : Gmail refuse les pièces jointes > 25 Mo
  var pdfMo=blob.size/1048576;
  if(pdfMo>20){
    alert('⚠️ Le PDF fait '+pdfMo.toFixed(1)+' Mo, c\'est trop lourd pour un envoi par email.\nSupprimez quelques photos et réessayez.');
    return;
  }

  // Apps Script pas configuré : envoi manuel direct
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==='COLLER_ICI_VOTRE_URL_APPS_SCRIPT'){
    if(wa)await partagerPDF(blob,filename,c);
    else _fallbackEmail(blob,filename,emailTo,emailCc,subject,corps);
    return;
  }

  // WhatsApp : on ouvre la fenêtre de partage TOUT DE SUITE (iOS exige un geste récent).
  // L'archivage serveur, lui, peut attendre le réseau.
  if(wa)await partagerPDF(blob,filename,c);

  var item={
    id:Date.now(),
    createdAt:Date.now(),
    filename:filename,
    blob:blob,
    tries:0,
    lastError:'',
    meta:{
      to:emailTo, cc:emailCc,
      subject:subject, body:corps,
      num:c.numComplet||c.num||'—',
      addr:c.addr||'—',
      client:c.client||'—',
      tech:c.tech||'—',
      responsable:resp.nom||'—',
      date:c.date||'',
      envoi:wa?'WhatsApp':'Email',
      reserves:res,
      // Métrés → colonnes du registre (suivi de production / facturation)
      nbCar:t.nbCar, mlCar:t.mlCar,
      mlSci:t.mlSci, m2Sci:t.m2Sci,
      nbCb:t.nbCb,   mlCb:t.mlCb,
      nbOuv:t.nbOuvCar+t.nbOuvSci,
      m2Ouv:Math.round((t.m2OuvCar+t.m2OuvSci)*100)/100,
      niveaux:t.niveaux,
      photos:(S.photos||[]).length
    }
  };

  // 1. On sécurise d'abord : le rapport est enregistré AVANT toute tentative réseau
  try{
    await qAdd(item);
  }catch(e){
    // IndexedDB indisponible (navigation privée...) : envoi direct, sans filet
    console.error('File d\'attente indisponible:',e);
    try{
      await sendItem(item);
      alert(wa?'✅ Rapport archivé.\n\n👷 Copie envoyée à '+resp.nom:'✅ Rapport envoyé par email !\n\n📧 Client : '+emailTo+(emailCc?'\n👷 '+resp.nom+' : '+emailCc:''));
    }catch(err){
      alert('❌ Envoi impossible : '+err.message+'\n\nLe PDF va être téléchargé, envoyez-le depuis votre application mail.');
      _fallbackEmail(blob,filename,emailTo,emailCc,subject,corps);
    }
    return;
  }
  queueCount=(await qAll()).length;
  renderQueue();

  // 2. Puis on tente l'envoi tout de suite
  var btn=document.getElementById('btn-gen');
  if(!navigator.onLine){
    alert(wa
      ? '📴 Pas de réseau.\n\nLe PDF a été partagé sur WhatsApp depuis votre téléphone.\nL\'archivage (Drive + registre + copie '+resp.nom+') se fera TOUT SEUL dès que le téléphone captera.'
      : '📴 Pas de réseau.\n\nLe rapport N° '+item.meta.num+' est enregistré et partira TOUT SEUL dès que le téléphone captera.\n\n➡️ Vous pouvez fermer l\'appli et enchaîner le chantier suivant.');
    return;
  }
  if(btn)btn.textContent='⏳ Envoi en cours...';
  try{
    await sendItem(item);
    await qDel(item.id);
    queueCount=(await qAll()).length;renderQueue();
    alert(wa
      ? '✅ Rapport archivé (Drive + registre).\n\n👷 Copie envoyée à '+resp.nom+'\n💬 Le client le reçoit par WhatsApp.'
      : '✅ Rapport envoyé par email !\n\n📧 Client : '+emailTo+(emailCc?'\n👷 '+resp.nom+' : '+emailCc:''));
  }catch(err){
    console.error('Erreur envoi:',err);
    var it=await qGet(item.id);
    if(it){it.tries=1;it.lastError=err.message;it.lastTry=Date.now();try{await qPut(it);}catch(e){}}
    renderQueue();
    alert('⚠️ L\'envoi n\'a pas abouti ('+err.message+').\n\nLe rapport N° '+item.meta.num+' est conservé dans la file d\'attente et sera renvoyé automatiquement.\n\n➡️ Bandeau jaune en haut de l\'écran pour le suivre.');
  }
}

// ── FALLBACK : téléchargement + ouverture client mail ──
function _fallbackEmail(blob,filename,emailClient,emailResp,subject,corps){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
  var mailtoUrl='mailto:'+encodeURIComponent(emailClient)
    +(emailResp?'?cc='+encodeURIComponent(emailResp)+'&':'?')
    +'subject='+encodeURIComponent(subject)
    +'&body='+encodeURIComponent(corps+'\n\n(Veuillez joindre le fichier : '+filename+')');
  setTimeout(function(){window.open(mailtoUrl,'_self');},800);
  alert('📎 PDF téléchargé !\nVotre application mail va s\'ouvrir.\nJoignez le fichier "'+filename+'" avant d\'envoyer.');
}

/* ── DÉCLENCHEURS DE RENVOI AUTOMATIQUE ──
   La file est vidée : à l'ouverture de l'appli, au retour du réseau,
   quand le chef d'équipe revient sur l'appli, et toutes les 60 s. */
qAll().then(function(items){queueCount=items.length;renderQueue();if(items.length)flushQueue(true);});
refillReserve();
chargerChefs(); // liste du personnel à jour (onglet "Personnel" du registre)

window.addEventListener('online',function(){
  renderQueue();
  refillReserve();
  chargerChefs();
  flushQueue(); // notification si des rapports repartent
});
window.addEventListener('offline',renderQueue);

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&navigator.onLine)flushQueue(true);
});

setInterval(function(){
  if(queueCount&&navigator.onLine&&!flushing)flushQueue(true);
},60000);

// Avertit si le chef d'équipe ferme l'appli avec des rapports non envoyés
window.addEventListener('beforeunload',function(e){
  if(queueCount>0){e.preventDefault();e.returnValue='';}
});
