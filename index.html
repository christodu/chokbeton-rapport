/* ── MÉTRÉS ────────────────────────────────────────────────────────────
   Une seule source de vérité pour les quantités : écran, PDF et registre
   Sheets lisent tous ce calcul. Unités : ep/prof en cm, ml et m en mètres.
   ──────────────────────────────────────────────────────────────────── */
function metres(blocs){
  var t={niveaux:(blocs||[]).length,
    nbCar:0, mlCar:0,        // carottages : nombre + ml forés (nb × épaisseur)
    mlSci:0, m2Sci:0,        // sciage : ml sciés + m² de coupe (ml × profondeur)
    nbCb:0,  mlCb:0,         // lamelles carbone : nombre + ml posés
    nbOuvCar:0, m2OuvCar:0,  // ouvertures par carottage : nombre + m²
    nbOuvSci:0, m2OuvSci:0}; // ouvertures par sciage : nombre + m²
  var n=function(v){var x=parseFloat(v);return isNaN(x)?0:x;};
  (blocs||[]).forEach(function(b){
    (b.carottages||[]).forEach(function(l){
      t.nbCar+=n(l.nb); t.mlCar+=n(l.nb)*n(l.ep)/100;
    });
    (b.sciages||[]).forEach(function(l){
      t.mlSci+=n(l.ml); t.m2Sci+=n(l.ml)*n(l.prof)/100;
    });
    (b.carbones||[]).forEach(function(l){
      t.nbCb+=n(l.nbl); t.mlCb+=n(l.nbl)*n(l.ll);
    });
    (b.ouvertures||[]).forEach(function(o){
      t.nbOuvCar++; t.m2OuvCar+=n(o.larg)*n(o.long);
      (o.carottages||[]).forEach(function(l){t.nbCar+=n(l.nb);t.mlCar+=n(l.nb)*n(l.ep)/100;});
    });
    (b.ouvsciages||[]).forEach(function(o){
      t.nbOuvSci++; t.m2OuvSci+=n(o.haut)*n(o.larg);
      (o.coupes||[]).forEach(function(cp){t.mlSci+=n(cp.nb)*n(cp.ml);t.m2Sci+=n(cp.nb)*n(cp.ml)*n(cp.ep)/100;});
      (o.carottages||[]).forEach(function(l){t.nbCar+=n(l.nb);t.mlCar+=n(l.nb)*n(l.ep)/100;});
    });
  });
  ['mlCar','mlSci','m2Sci','mlCb','m2OuvCar','m2OuvSci'].forEach(function(k){
    t[k]=Math.round(t[k]*100)/100;
  });
  return t;
}
// Lignes du récapitulatif, réutilisées par l'écran, le PDF et l'email
function metresLignes(t){
  var r=[];
  if(t.nbCar>0)   r.push(['Carottage',            t.nbCar+' carottage(s)', t.mlCar>0?t.mlCar+' ml forés':'']);
  if(t.mlSci>0)   r.push(['Sciage',               t.mlSci+' ml',           t.m2Sci>0?t.m2Sci+' m² de coupe':'']);
  if(t.nbCb>0)    r.push(['Lamelles carbone',     t.nbCb+' lamelle(s)',    t.mlCb>0?t.mlCb+' ml posés':'']);
  if(t.nbOuvCar>0)r.push(['Ouvertures carottage', t.nbOuvCar+' ouverture(s)', t.m2OuvCar>0?t.m2OuvCar+' m²':'']);
  if(t.nbOuvSci>0)r.push(['Ouvertures sciage',    t.nbOuvSci+' ouverture(s)', t.m2OuvSci>0?t.m2OuvSci+' m²':'']);
  return r;
}

   Position capturée au moment de l'ajout des photos et imprimée sous
   chaque cliché (preuve : le bon chantier, le bon jour). Silencieux si
   le chef refuse la permission ou si le GPS ne capte pas (sous-sol).
   ──────────────────────────────────────────────────────────────────── */
var geoCache=null;
function getGeo(){
  return new Promise(function(resolve){
    if(!navigator.geolocation)return resolve(null);
    if(geoCache&&Date.now()-geoCache.at<300000)return resolve(geoCache); // < 5 min : on réutilise
    navigator.geolocation.getCurrentPosition(
      function(p){geoCache={lat:p.coords.latitude,lng:p.coords.longitude,at:Date.now()};resolve(geoCache);},
      function(){resolve(null);},
      {enableHighAccuracy:false,timeout:8000,maximumAge:300000}
    );
  });
}
function geoTxt(p){
  if(!p||!p.at)return '';
  var d=new Date(p.at);
  var s=('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+('0'+d.getHours()).slice(-2)+'h'+('0'+d.getMinutes()).slice(-2);
  if(p.lat&&p.lng)s+='  ·  '+p.lat.toFixed(5)+', '+p.lng.toFixed(5);
  return s;
}

    });

  }catch(e){
    try{
      var hist2=JSON.parse(localStorage.getItem('cb_historique')||'[]');
      hist2.unshift({id:Date.now(),filename:filename,date:c.date,num:c.num||'—',addr:c.addr||'—',client:c.client||'—',tech:c.tech||'—',resp:resp.nom||'—',niveaux:blocs.length,createdAt:new Date().toISOString(),

      });
      if(hist2.length>30)hist2=hist2.slice(0,30);
      localStorage.setItem('cb_historique',JSON.stringify(hist2));

  }

/* ── NOUVELLE VISITE ───────────────────────────────────────────────────
   Chantier multi-semaines : on repart du rapport précédent (n°, adresse,
   client, email, chef d'équipe) et on incrémente le n° de visite.
   Les travaux, photos et la signature sont remis à zéro : c'est une
   nouvelle intervention, pas une copie.
   ──────────────────────────────────────────────────────────────────── */
function nouvelleVisite(id){
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  var src=r.fullData.info||{};
  var vis=parseInt(src.visite||1)||1;
  var suivante=vis+1;
  if(!confirm('Nouvelle visite sur le chantier :\n'+(src.addr||'—')+'\n\nN° '+(src.num||'—')+' — visite V'+suivante
    +'\n\nLes informations du chantier sont reprises.\nLes travaux, photos et signature repartent à zéro.'))return;
  S.info={
    date:new Date().toISOString().slice(0,10),
    num:src.num||'',            // même n° de chantier
    visite:String(suivante),    // visite incrémentée
    addr:src.addr||'',
    client:src.client||'',
    tech:src.tech||'',
    date_debut:src.date_debut||'',
    date_fin:'',
    email_client:src.email_client||''
  };
  S.blocs=[];S.photos=[];S.resp='';
  S.sig={url:'',name:'',absent:false,at:''};
  S.reserves={has:false,texte:''};
  S.step=2;histOpen=false;uid=1;
  saveState();R();showHistory();
  alert('✅ Visite V'+suivante+' préparée.\nSaisissez les travaux de cette semaine.');
}
function restoreReport(id){
  if(!confirm('Charger ce rapport ?\nLe rapport en cours sera remplacé.'))return;
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  Object.assign(S.info,r.fullData.info);
  S.blocs=JSON.parse(JSON.stringify(r.fullData.blocs));
  S.sig={name:r.fullData.sig.name,url:r.fullData.sig.url||'',absent:false,at:r.fullData.sig.at||''};
  S.photos=JSON.parse(JSON.stringify(r.fullData.photos||[]));
  S.reserves=(r.fullData.info&&r.fullData.info.reserves)?JSON.parse(JSON.stringify(r.fullData.info.reserves)):{has:false,texte:''};
  S.resp='';S.step=1;histOpen=false;saveState();R();
  alert('Rapport chargé !');
}
async function regenPDF(id){
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  var respObj=EQUIPE.find(function(e){return e.nom===r.resp;})||{nom:r.resp,email:''};
  try{
    var blob=await buildPDFFromData(r.fullData.info,r.fullData.blocs,r.fullData.sig,r.fullData.photos||[],respObj,r.filename);
    await envoyerParEmail(blob,r.filename,r.fullData.info,respObj);
  }catch(e){alert('Erreur : '+e.message);}
}

// Contrôles bloquants avant l'envoi
function verifRapport(){
  var c=S.info,m=[];
  if(!c.num||!c.num.trim())m.push('N° de rapport');
  if(!c.addr||!c.addr.trim())m.push('Adresse / Nom du chantier');
  if(!c.tech||!c.tech.trim())m.push('Chef d\'équipe');
  if(!S.blocs.length)m.push('Aucun niveau saisi');
  if(!S.resp)m.push('Responsable du chantier non sélectionné');
  if(S.envoi==='email'&&!S.sig.absent){
    if(!c.email_client)m.push('Email du client');
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(c.email_client))m.push('Email du client invalide');
  }
  if(S.reserves.has&&!(S.reserves.texte||'').trim())m.push('Nature des réserves');
  if(!S.sig.absent&&!S.sig.url)m.push('Signature du client');
  return m;
}

function addPhotos(input){
  var files=Array.from(input.files),rem=10-S.photos.length,toAdd=files.slice(0,rem);
  if(!toAdd.length)return;
  var done=0,total=toAdd.length;
  var geoP=getGeo(); // demandé une fois, appliqué à toutes les photos du lot
  var tagGeo=function(ph){geoP.then(function(g){ph.geo=g?{lat:g.lat,lng:g.lng,at:Date.now()}:{at:Date.now()};});};
  toAdd.forEach(function(f){
    var objUrl=URL.createObjectURL(f);
    var img=new Image();
    img.onload=function(){
      // Le navigateur applique automatiquement la rotation EXIF via drawImage
      // Redimensionnement : côté long limité à PHOTO_MAX px (photo iPhone = 4032px)
      var w=img.naturalWidth,h=img.naturalHeight;
      var ratio=Math.min(1,PHOTO_MAX/Math.max(w,h));
      var cv=document.createElement('canvas');
      cv.width=Math.round(w*ratio);cv.height=Math.round(h*ratio);
      var ctx=cv.getContext('2d');
      ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(objUrl);
      var ph={url:cv.toDataURL('image/jpeg',PHOTO_Q),caption:'',geo:null};
      S.photos.push(ph);tagGeo(ph);
      if(++done===total)R();
    };
    img.onerror=function(){
      // Fallback si createObjectURL échoue
      URL.revokeObjectURL(objUrl);
      var r=new FileReader();
      r.onload=function(e){var ph={url:e.target.result,caption:'',geo:null};S.photos.push(ph);tagGeo(ph);if(++done===total)R();};
      r.readAsDataURL(f);
    };
    img.src=objUrl;
  });
}

// ── SAVE MODAL FIELDS ──
function saveModalFields(){
  var m=S.m;
  function gv(id){var e=document.getElementById(id);return e?e.value:null;}
  var obs=document.getElementById('m-obs');if(obs)m.obs=obs.value;
  var aut=document.getElementById('m-autres');if(aut)m.autres=aut.value;
  (m.carottages||[]).forEach(function(l,i){
    var d=gv('car-d-'+i);if(d)l.diam=d;
    var dc=gv('car-dc-'+i);if(dc!==null)l.diamCustom=dc;
    var n=gv('car-n-'+i);if(n)l.nb=Math.max(1,parseInt(n)||1);
    var e=gv('car-e-'+i);if(e!==null)l.ep=e;
    var h=gv('car-h-'+i);if(h!==null)l.haut=h;
  });
  (m.sciages||[]).forEach(function(l,i){
    var ml=gv('sci-ml-'+i);if(ml)l.ml=ml;
    var pr=gv('sci-pr-'+i);if(pr!==null)l.prof=pr;
    var h=gv('sci-h-'+i);if(h!==null)l.haut=h;
  });
  (m.carbones||[]).forEach(function(l,i){
    var t=gv('cb-t-'+i);if(t!==null)l.type=t;
    var n=gv('cb-n-'+i);if(n)l.nbl=n;
    var ll=gv('cb-l-'+i);if(ll)l.ll=ll;
  });
  (m.ouvertures||[]).forEach(function(o,i){
    var la=gv('ouv-la-'+i);if(la)o.larg=la;
    var lo=gv('ouv-lo-'+i);if(lo)o.long=lo;
    var h=gv('ouv-h-'+i);if(h!==null)o.haut=h;
    (o.carottages||[]).forEach(function(c,ci){
      var d=gv('ouvc-d-'+i+'-'+ci);if(d)c.diam=d;
      var dc=gv('ouvc-dc-'+i+'-'+ci);if(dc!==null)c.diamCustom=dc;
      var n=gv('ouvc-n-'+i+'-'+ci);if(n)c.nb=Math.max(1,parseInt(n)||1);
      var e=gv('ouvc-e-'+i+'-'+ci);if(e!==null)c.ep=e;
    });
  });
  (m.ouvsciages||[]).forEach(function(o,i){
    var h=gv('ouvs-h-'+i);if(h!==null)o.haut=h;
    var l=gv('ouvs-l-'+i);if(l!==null)o.larg=l;
    var b=gv('ouvs-blocs-'+i);if(b!==null)o.nbBlocs=b;
    (o.coupes||[]).forEach(function(cp,ci){
      var nb=gv('ouvs-cnb-'+i+'-'+ci);if(nb!==null)cp.nb=nb;
      var ml=gv('ouvs-cml-'+i+'-'+ci);if(ml!==null)cp.ml=ml;
      var ep=gv('ouvs-cep-'+i+'-'+ci);if(ep!==null)cp.ep=ep;
    });
    (o.carottages||[]).forEach(function(c,ci){
      var d=gv('ouvsc-d-'+i+'-'+ci);if(d)c.diam=d;
      var dc=gv('ouvsc-dc-'+i+'-'+ci);if(dc!==null)c.diamCustom=dc;
      var n=gv('ouvsc-n-'+i+'-'+ci);if(n)c.nb=Math.max(1,parseInt(n)||1);
      var e=gv('ouvsc-e-'+i+'-'+ci);if(e!==null)c.ep=e;
    });
  });
}

// ── EVENT DELEGATION ──
function initModalEvents(){
  var modal=document.getElementById('modal');
  var ov=document.getElementById('ov');
  ov.addEventListener('click',function(e){if(e.target===this)closeM();});
  modal.addEventListener('click',function(e){
    var el=e.target.closest('[data-c]');
    if(!el)return;
    e.stopPropagation();
    saveModalFields();
    var c=el.dataset.c,i=parseInt(el.dataset.i||0),j=parseInt(el.dataset.j||0),v=el.dataset.v||'';
    if(c==='close'){closeM();return;}
    if(c==='save'){saveBloc();return;}
    if(c==='niv'){S.m.niveau=S.m.niveau===v?'':v;}
    // Carottages
    else if(c==='car-add')S.m.carottages.push(newCar());
    else if(c==='car-del')S.m.carottages.splice(i,1);
    else if(c==='car-nb+')S.m.carottages[i].nb=Math.max(1,(S.m.carottages[i].nb||1)+1);
    else if(c==='car-nb-')S.m.carottages[i].nb=Math.max(1,(S.m.carottages[i].nb||1)-1);
    else if(c==='car-supp')S.m.carottages[i].supp=v;
    // Sciages
    else if(c==='sci-add')S.m.sciages.push(newSci());
    else if(c==='sci-del')S.m.sciages.splice(i,1);
    else if(c==='sci-supp')S.m.sciages[i].supp=v;
    // Carbones
    else if(c==='cb-add')S.m.carbones.push(newCb());
    else if(c==='cb-del')S.m.carbones.splice(i,1);
    else if(c==='cb-ori')S.m.carbones[i].ori=v;
    // Ouvertures carottages
    else if(c==='ouv-add')S.m.ouvertures.push(newOuv());
    else if(c==='ouv-del')S.m.ouvertures.splice(i,1);
    else if(c==='ouv-supp')S.m.ouvertures[i].supp=v;
    else if(c==='ouvc-add')(S.m.ouvertures[i].carottages=S.m.ouvertures[i].carottages||[]).push({diam:200,nb:1,ep:'',diamCustom:''});
    else if(c==='ouvc-del')S.m.ouvertures[i].carottages.splice(j,1);
    else if(c==='ouvc-nb+')S.m.ouvertures[i].carottages[j].nb=Math.max(1,(S.m.ouvertures[i].carottages[j].nb||1)+1);
    else if(c==='ouvc-nb-')S.m.ouvertures[i].carottages[j].nb=Math.max(1,(S.m.ouvertures[i].carottages[j].nb||1)-1);
    // Ouvertures sciage
    else if(c==='ouvs-add')S.m.ouvsciages.push(newOuvSci());
    else if(c==='ouvs-del')S.m.ouvsciages.splice(i,1);
    else if(c==='ouvs-cadd')(S.m.ouvsciages[i].coupes=S.m.ouvsciages[i].coupes||[]).push(newCoupe());
    else if(c==='ouvs-cdel')S.m.ouvsciages[i].coupes.splice(j,1);
    else if(c==='ouvsc-add')(S.m.ouvsciages[i].carottages=S.m.ouvsciages[i].carottages||[]).push(newOuvSciCar());
    else if(c==='ouvsc-del')S.m.ouvsciages[i].carottages.splice(j,1);
    else if(c==='ouvsc-nb+')S.m.ouvsciages[i].carottages[j].nb=Math.max(1,(S.m.ouvsciages[i].carottages[j].nb||1)+1);
    else if(c==='ouvsc-nb-')S.m.ouvsciages[i].carottages[j].nb=Math.max(1,(S.m.ouvsciages[i].carottages[j].nb||1)-1);
    renderModal();
  });
  modal.addEventListener('change',function(e){
    var el=e.target,ch=el.dataset.ch;if(!ch)return;
    saveModalFields();
    var i=parseInt(el.dataset.i||0),j=parseInt(el.dataset.j||0);
    if(ch==='car-diam'){S.m.carottages[i].diam=el.value;renderModal();}
    else if(ch==='ouvc-diam'){S.m.ouvertures[i].carottages[j].diam=el.value;renderModal();}
    else if(ch==='ouvsc-diam'){S.m.ouvsciages[i].carottages[j].diam=el.value;renderModal();}
    else if(ch==='cb-type'){S.m.carbones[i].type=el.value;}
  });
}

// ── SAVE BLOC ──
function saveBloc(){
  saveModalFields();var m=S.m;
  var hasWork=(m.carottages||[]).length>0||(m.sciages||[]).length>0||(m.carbones||[]).length>0||(m.ouvertures||[]).length>0||(m.ouvsciages||[]).length>0||m.autres;

function initSig(){
  var cv=document.getElementById('sigc');if(!cv)return;
  sc=cv;sx=cv.getContext('2d');sx.strokeStyle='#1E2D35';sx.lineWidth=3;sx.lineCap='round';sx.lineJoin='round';
  if(S.sig.url){var img=new Image();img.onload=function(){sx.drawImage(img,0,0,cv.width,cv.height);};img.src=S.sig.url;}
  function pos(e){var r=cv.getBoundingClientRect(),sw=cv.width/r.width,sh=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sw,y:(s.clientY-r.top)*sh};}
  cv.addEventListener('mousedown',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);});
  cv.addEventListener('mousemove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();});
  cv.addEventListener('mouseup',function(){drawing=false;if(sc){S.sig.url=sc.toDataURL();S.sig.at=new Date().toISOString();}});
  cv.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);},{passive:false});
  cv.addEventListener('touchmove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();},{passive:false});
  cv.addEventListener('touchend',function(){drawing=false;if(sc){S.sig.url=sc.toDataURL();S.sig.at=new Date().toISOString();}});
}
function clearSig(){if(sc&&sx){sx.clearRect(0,0,sc.width,sc.height);S.sig.url='';S.sig.at='';}}
/* ── RÉSERVE DE NUMÉROS ────────────────────────────────────────────────
   Le compteur est centralisé sur le serveur : sans réseau, impossible
   d'obtenir un numéro. On en met donc RESERVE_CIBLE d'avance de côté
   dès qu'il y a du réseau. Le bouton 🔢 Auto pioche dans cette réserve
   et fonctionne donc même en sous-sol.
   Note : un numéro réservé mais non utilisé laisse un trou dans le
   registre — c'est normal et sans conséquence.
   ──────────────────────────────────────────────────────────────────── */
var RESERVE_CIBLE=3, refilling=false;
function reserveGet(){try{return JSON.parse(localStorage.getItem('cb_num_reserve')||'[]');}catch(e){return [];}}
function reserveSet(a){try{localStorage.setItem('cb_num_reserve',JSON.stringify(a));}catch(e){}}
async function refillReserve(){
  if(refilling||!navigator.onLine)return;
  var r=reserveGet();
  var manque=RESERVE_CIBLE-r.length;
  if(manque<=0)return;
  refilling=true;
  try{
    var res=await fetch(APPS_SCRIPT_URL+'?action=nextNum&count='+manque+'&token='+encodeURIComponent(APP_TOKEN));
    var data=await res.json();
    if(data&&data.ok){
      var nums=data.nums||(data.num?[data.num]:[]);
      reserveSet(reserveGet().concat(nums));
    }
  }catch(e){/* pas de réseau : on retentera */}
  finally{refilling=false;}
}
async function getNumAuto(){
  var btn=document.getElementById('btn-num');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try{
    var r=reserveGet();
    if(!r.length){
      if(!navigator.onLine){
        alert('📴 Pas de réseau et aucun numéro en réserve.\n\n➡️ Saisissez le N° à la main pour l\'instant, ou reconnectez-vous quelques secondes : l\'appli met 3 numéros de côté pour les prochains chantiers hors ligne.');
        return;
      }
      await refillReserve();
      r=reserveGet();
      if(!r.length){alert('⚠️ Impossible de générer le numéro.\nVérifiez votre connexion internet.');return;}
    }
    var num=r.shift();
    reserveSet(r);
    S.info.num=num;
    var el=document.getElementById('f-num');
    if(el)el.value=num;
    refillReserve(); // on recomplète la réserve en arrière-plan
  }finally{
    if(btn){btn.textContent='🔢 Auto';btn.disabled=false;}
  }
}

  // Photos

        doc.addImage(imgUrl,imgFmt,px,y,iw2,ih);
        doc.setDrawColor(BRD[0],BRD[1],BRD[2]);doc.setLineWidth(0.3);doc.line(px,y,px+iw2,y);doc.line(px,y+ih,px+iw2,y+ih);doc.line(px,y,px,y+ih);doc.line(px+iw2,y,px+iw2,y+ih);

        // Horodatage + coordonnées GPS : preuve du bon chantier, au bon moment

  // ── RÉSERVES DU CLIENT ──
  // Un rapport signé vaut PV de réception : les réserves doivent être écrites,
  // en évidence, juste avant la signature.
  var RES=(c.reserves&&c.reserves.has&&(c.reserves.texte||'').trim())?c.reserves.texte.trim():'';

    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(154,52,18);
    doc.text('Le client accepte les travaux SOUS RESERVE(S) :',M+8,y+8);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(60,30,10);
    resLines.forEach(function(l,i){doc.text(l,M+8,y+15+i*5);});
    doc.setLineWidth(0.2);doc.setDrawColor(BRD[0],BRD[1],BRD[2]);
    y+=resH+6;
  }else if(!sig.absent){
    if(y+12>PH-30){doc.addPage();y=15;}
    doc.setFillColor(240,253,244);doc.setDrawColor(134,239,172);doc.setLineWidth(0.4);

    doc.setLineWidth(0.2);doc.setDrawColor(BRD[0],BRD[1],BRD[2]);
    y+=14;
  }

  // ── SIGNATURE & VALIDATION ──
  if(y>PH-72){doc.addPage();y=15;}
  secTitle(sig.absent?'RAPPORT SANS SIGNATURE CLIENT':(RES?'VALIDATION CLIENT — ACCORD AVEC RESERVES':'VALIDATION CLIENT — BON POUR ACCORD'));

  // Bloc gauche : signature client OU mention absent
  if(sig.absent){

    set(WHT,BRD);doc.roundedRect(M,y,sigW,62,1,1,'FD');
    // En-tête orange/ambre
    doc.setFillColor(245,158,11);doc.roundedRect(M,y,sigW,11,1,1,'F');
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text('CLIENT ABSENT',M+sigW/2,y+7.5,{align:'center'});
    // Icône et texte
    doc.setFontSize(22);doc.setTextColor(245,158,11);
    doc.text('!',M+sigW/2,y+28,{align:'center'});
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(DRK[0],DRK[1],DRK[2]);
    doc.text('Signature impossible',M+sigW/2,y+38,{align:'center'});

    var absLines=['Le client était absent lors de','l\'intervention. Ce rapport est','transmis sans signature client.'];
    absLines.forEach(function(l,i){doc.text(l,M+sigW/2,y+46+i*5,{align:'center'});});
    doc.text('Date : '+fd(c.date),M+sigW/2,y+62-4,{align:'center'});
  }else{
    // Bloc normal
    set(WHT,BRD);doc.roundedRect(M,y,sigW,62,1,1,'FD');

    doc.text(sig.name||'—',M+sigW/2,y+20,{align:'center'});
    doc.setFontSize(7);doc.setFont('helvetica','normal');set(null,null,GRY);
    doc.text(RES?'Lu et approuvé — Accord SOUS RÉSERVES':'Lu et approuvé — Bon pour accord',M+sigW/2,y+26,{align:'center'});
    if(sig.url){
      try{doc.addImage(sig.url,'PNG',M+sigW/2-20,y+29,40,20);}catch(e){}
    }else{
      set(null,BRD);doc.setLineDashPattern([1.5,1.5],0);
      doc.rect(M+8,y+29,sigW-16,20,'S');
      doc.setLineDashPattern([],0);
      doc.setFontSize(7);set(null,null,[200,210,215]);
      doc.text('Signature',M+sigW/2,y+41,{align:'center'});
    }
    // Horodatage de la signature : une signature sans date a une faible valeur probante
    doc.setFontSize(8);doc.setFont('helvetica','normal');set(null,null,GRY);
    var sAt=sig.at?new Date(sig.at):null;
    var sTxt=sAt&&!isNaN(sAt)
      ? 'Signé le '+('0'+sAt.getDate()).slice(-2)+'/'+('0'+(sAt.getMonth()+1)).slice(-2)+'/'+sAt.getFullYear()
        +' à '+('0'+sAt.getHours()).slice(-2)+'h'+('0'+sAt.getMinutes()).slice(-2)

  // Bloc droit : bon pour accord
  var rx=M+sigW+5;
  set(WHT,BRD);doc.roundedRect(rx,y,sigW,62,1,1,'FD');
  set(YEL);doc.roundedRect(rx,y,sigW,11,1,1,'F');
  doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,DRK);
  doc.text('BON POUR ACCORD',rx+sigW/2,y+7.5,{align:'center'});

  set(LGT,BRD);doc.roundedRect(rx+6,y+30,sigW-12,24,.5,.5,'FD');

  doc.text('Responsable : '+resp.nom,rx+sigW/2,y+58,{align:'center'});

  var total=doc.getNumberOfPages();var now=new Date();
  for(var p=1;p<=total;p++){
    doc.setPage(p);
    // Barre jaune de séparation
    set(YEL);doc.rect(0,PH-16,PW,1.5,'F');
    // Fond sombre footer
    set(DRK);doc.rect(0,PH-14.5,PW,14.5,'F');
    // Barre jaune verticale gauche

    doc.setFontSize(6.5);doc.setFont('helvetica','normal');set(null,null,[180,195,200]);

    doc.setFontSize(6.5);set(null,null,[180,195,200]);
    doc.text('N '+String(c.numComplet||c.num||'—')+'  |  Resp. '+resp.nom+'  |  Généré le '+now.toLocaleDateString('fr-FR'),PW/2,PH-7.5,{align:'center'});
    // Pagination à droite en jaune

  return doc.output('blob');
}

/* ══════════════════════════════════════════════════════════════════════
   FILE D'ATTENTE HORS LIGNE
   Sur chantier (sous-sol, zone blanche), le réseau tombe. Tout rapport
   généré est d'abord ENREGISTRÉ dans IndexedDB (le PDF est stocké tel
   quel, pas en base64 : localStorage exploserait à 5 Mo), puis envoyé.
   S'il n'y a pas de réseau, il reste en file et repart tout seul :
   au retour du réseau, à la réouverture de l'appli, et toutes les 60 s.
   Rien n'est jamais perdu, et rien n'est envoyé deux fois.
   ══════════════════════════════════════════════════════════════════════ */
var DB_NAME='chokbeton',DB_STORE='queue',DB_VER=1;
var flushing=false,queueCount=0,queuePanelOpen=false;

function idb(){
  return new Promise(function(resolve,reject){
    var rq=indexedDB.open(DB_NAME,DB_VER);
    rq.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains(DB_STORE))db.createObjectStore(DB_STORE,{keyPath:'id'});
    };
    rq.onsuccess=function(){resolve(rq.result);};
    rq.onerror=function(){reject(rq.error||new Error('IndexedDB indisponible'));};
  });
}
function idbTx(mode,fn){
  return idb().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction(DB_STORE,mode),st=tx.objectStore(DB_STORE),out;
      out=fn(st);
      tx.oncomplete=function(){resolve(out&&out.result!==undefined?out.result:out);};
      tx.onerror=function(){reject(tx.error);};
      tx.onabort=function(){reject(tx.error||new Error('Transaction annulée'));};
    });
  });
}
function qAdd(item){return idbTx('readwrite',function(st){return st.add(item);});}
function qPut(item){return idbTx('readwrite',function(st){return st.put(item);});}
function qDel(id){return idbTx('readwrite',function(st){return st.delete(id);});}
function qAll(){
  return idbTx('readonly',function(st){return st.getAll();}).then(function(list){
    return (list||[]).sort(function(a,b){return a.createdAt-b.createdAt;}); // FIFO
  }).catch(function(){return [];});
}
function qGet(id){return idbTx('readonly',function(st){return st.get(id);});}

// ── ENVOI D'UN ÉLÉMENT DE LA FILE ──
async function sendItem(item){
  var base64=await new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(){resolve(reader.result.split(',')[1]);};
    reader.onerror=function(){reject(new Error('Lecture du PDF impossible'));};
    reader.readAsDataURL(item.blob);
  });
  // msgId : identifiant unique du rapport. Si le réseau coupe après l'envoi mais
  // avant la réponse, le serveur reconnaît le renvoi et n'envoie pas 2 fois.
  var payload=Object.assign({token:APP_TOKEN,msgId:item.id,pdf:base64,filename:item.filename},item.meta);
  var res=await fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });
  if(!res.ok)throw new Error('Serveur injoignable (HTTP '+res.status+')');
  var out=await res.json();
  if(!out||out.success!==true)throw new Error(out&&out.error?out.error:'Envoi refusé par le serveur');
  return true;
}

// ── VIDAGE DE LA FILE (FIFO, on s'arrête à la 1re erreur réseau) ──
async function flushQueue(silencieux){
  if(flushing)return {envoyes:0,restants:queueCount};
  var items=await qAll();
  if(!items.length){queueCount=0;renderQueue();return {envoyes:0,restants:0};}
  if(!navigator.onLine){queueCount=items.length;renderQueue();return {envoyes:0,restants:items.length};}

  flushing=true;renderQueue();
  var envoyes=0;
  try{
    for(var i=0;i<items.length;i++){
      var it=items[i];
      try{
        await sendItem(it);
        await qDel(it.id);
        envoyes++;
      }catch(err){
        it.tries=(it.tries||0)+1;
        it.lastError=err.message;
        it.lastTry=Date.now();
        try{await qPut(it);}catch(e){}
        break; // réseau/serveur KO : inutile d'insister sur les suivants
      }
    }
  }finally{
    flushing=false;
  }
  var reste=await qAll();
  queueCount=reste.length;
  renderQueue();
  if(envoyes>0&&!silencieux){
    alert('✅ '+envoyes+' rapport'+(envoyes>1?'s':'')+' en attente '+(envoyes>1?'ont':'a')+' été envoyé'+(envoyes>1?'s':'')+' avec succès.');
  }
  return {envoyes:envoyes,restants:reste.length};
}

// ── BANDEAU + PANNEAU DE LA FILE ──
function renderQueue(){
  var bar=document.getElementById('qbar');if(!bar)return;
  var offline=!navigator.onLine;
  if(!queueCount&&!offline){bar.innerHTML='';return;}

  var msg,bg,bd,fg;
  if(queueCount){
    bg='#fffbeb';bd='#fcd34d';fg='#92400e';
    msg='⏳ <b>'+queueCount+' rapport'+(queueCount>1?'s':'')+' en attente d\'envoi</b>'
      +(offline?' — 📴 hors ligne, envoi automatique au retour du réseau'
               :(flushing?' — envoi en cours…':' — sera renvoyé automatiquement'));
  }else{
    bg='#f1f5f9';bd='#cbd5e1';fg='#475569';
    msg='📴 <b>Hors ligne</b> — vous pouvez continuer, les rapports partiront au retour du réseau';
  }
  bar.innerHTML='<div style="background:'+bg+';border-bottom:1px solid '+bd+';color:'+fg
    +';padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
    +'<div style="flex:1;min-width:180px;line-height:1.4">'+msg+'</div>'
    +(queueCount?'<button onclick="toggleQueuePanel()" style="background:#fff;border:1px solid '+bd+';color:'+fg+';border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer">'+(queuePanelOpen?'Masquer':'Détail')+'</button>':'')
    +(queueCount&&!offline&&!flushing?'<button onclick="flushQueue()" style="background:var(--dk);border:none;color:var(--y);border-radius:6px;padding:4px 9px;font-size:11px;font-weight:800;cursor:pointer">↻ Envoyer</button>':'')
    +'</div>'
    +(queuePanelOpen?'<div id="qlist" style="background:#fff;border-bottom:1px solid '+bd+'"></div>':'');
  if(queuePanelOpen)renderQueueList();
}
function toggleQueuePanel(){queuePanelOpen=!queuePanelOpen;renderQueue();}
async function renderQueueList(){
  var el=document.getElementById('qlist');if(!el)return;
  var items=await qAll();
  if(!items.length){el.innerHTML='';return;}
  el.innerHTML=items.map(function(it){
    var d=new Date(it.createdAt);
    var hh=('0'+d.getHours()).slice(-2)+'h'+('0'+d.getMinutes()).slice(-2);
    return '<div style="padding:9px 12px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:12px;font-weight:800;color:var(--text)">N° '+(it.meta.num||'—')+' — '+(it.meta.addr||'—')+'</div>'
      +'<div style="font-size:10px;color:var(--mut);margin-top:2px">Créé à '+hh+' · '+(it.tries||0)+' tentative'+((it.tries||0)>1?'s':'')
      +(it.lastError?' · <span style="color:#b91c1c">'+it.lastError+'</span>':'')+'</div>'
      +'</div>'
      +'<button onclick="queueSendOne('+it.id+')" title="Renvoyer" style="background:var(--dk);border:none;color:var(--y);border-radius:6px;padding:5px 8px;font-size:11px;font-weight:800;cursor:pointer">↻</button>'
      +'<button onclick="queueMailManuel('+it.id+')" title="Envoyer depuis l\'app Mail" style="background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1;border-radius:6px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer">📎</button>'
      +'<button onclick="queueDelete('+it.id+')" title="Supprimer de la file" style="background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;border-radius:6px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer">🗑</button>'
      +'</div>';
  }).join('');
}
async function queueSendOne(id){
  if(!navigator.onLine){alert('📴 Pas de réseau.\nLe rapport partira automatiquement dès que le téléphone captera.');return;}
  var it=await qGet(id);if(!it)return;
  try{
    await sendItem(it);
    await qDel(id);
    queueCount=(await qAll()).length;renderQueue();
    alert('✅ Rapport N° '+(it.meta.num||'—')+' envoyé.');
  }catch(err){
    it.tries=(it.tries||0)+1;it.lastError=err.message;it.lastTry=Date.now();
    try{await qPut(it);}catch(e){}
    renderQueue();
    alert('❌ Envoi impossible : '+err.message);
  }
}
async function queueDelete(id){
  var it=await qGet(id);if(!it)return;
  if(!confirm('Supprimer définitivement le rapport N° '+(it.meta.num||'—')+' de la file ?\n\n⚠️ Il ne sera JAMAIS envoyé au client.'))return;
  await qDel(id);
  queueCount=(await qAll()).length;renderQueue();
}
// Envoi manuel via l'app Mail du téléphone (le mail partira au retour du réseau).
// On retire alors le rapport de la file pour éviter un double envoi.
async function queueMailManuel(id){
  var it=await qGet(id);if(!it)return;
  if(!confirm('Envoyer le rapport N° '+(it.meta.num||'—')+' depuis votre application mail ?\n\nIl sera retiré de la file d\'attente (pas de double envoi), mais il ne sera PAS archivé dans Drive ni dans le registre.'))return;
  _fallbackEmail(it.blob,it.filename,it.meta.to,it.meta.cc,it.meta.subject,it.meta.body);
  await qDel(id);
  queueCount=(await qAll()).length;renderQueue();
}

/* ── PARTAGE NATIF (WhatsApp) ──────────────────────────────────────────
   WhatsApp n'accepte pas de pièce jointe via un lien : on passe par la
   fenêtre de partage du téléphone, qui transmet le vrai fichier PDF.
   Doit être appelé juste après un geste de l'utilisateur (sinon iOS refuse).
   ──────────────────────────────────────────────────────────────────── */
function telechargerPDF(blob,filename){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
}
async function partagerPDF(blob,filename,c){
  try{
    var file=new File([blob],filename,{type:'application/pdf'});
    if(!navigator.canShare||!navigator.canShare({files:[file]}))throw new Error('non-supporte');
    await navigator.share({
      files:[file],
      title:'Rapport CHOK BETON — N° '+(c.numComplet||c.num||''),
      text:'Bonjour, voici le rapport de chantier CHOK BETON.\n'
        +'N° '+(c.numComplet||c.num||'-')+' — '+(c.addr||'-')
    });
    return true;
  }catch(e){
    if(e&&e.name==='AbortError'){
      alert('Partage annulé.\n\nLe rapport reste disponible dans 📋 Historique → 📄 Renvoyer.');
      return false;
    }
    // Ordinateur ou navigateur sans partage de fichier → téléchargement
    telechargerPDF(blob,filename);
    alert('📎 Le partage direct n\'est pas disponible sur cet appareil.\nLe PDF a été téléchargé : envoyez-le manuellement depuis WhatsApp.');
    return false;
  }
}

    +(res?"\nRESERVES DU CLIENT : "+res+"\n":"")+"\n"
    +"Cordialement,\nL'equipe CHOK BETON\n"
    +"1 Rue Hector Berlioz - 95210 SAINT GRATIEN";

  var clientAbsent=S.sig&&S.sig.absent;
  // WhatsApp : le client reçoit le PDF par partage, le serveur n'envoie qu'au responsable
  var emailTo=wa?emailResp:((!clientAbsent&&emailClient)?emailClient:emailResp);
  var emailCc=wa?'':((!clientAbsent&&emailClient)?emailResp:'');

  // Garde-fou : Gmail refuse les pièces jointes > 25 Mo
  var pdfMo=blob.size/1048576;
  if(pdfMo>20){
    alert('⚠️ Le PDF fait '+pdfMo.toFixed(1)+' Mo, c\'est trop lourd pour un envoi par email.\nSupprimez quelques photos et réessayez.');
    return;
  }

  // Apps Script pas configuré : envoi manuel direct
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==='COLLER_ICI_VOTRE_URL_APPS_SCRIPT'){
    if(wa)await partagerPDF(blob,filename,c);
    else _fallbackEmail(blob,filename,emailTo,emailCc,subject,corps);
    return;
  }

  // WhatsApp : on ouvre la fenêtre de partage TOUT DE SUITE (iOS exige un geste récent).
  // L'archivage serveur, lui, peut attendre le réseau.
  if(wa)await partagerPDF(blob,filename,c);

  var item={
    id:Date.now(),
    createdAt:Date.now(),
    filename:filename,
    blob:blob,
    tries:0,
    lastError:'',
    meta:{
      to:emailTo, cc:emailCc,
      subject:subject, body:corps,
      num:c.numComplet||c.num||'—',
      addr:c.addr||'—',
      client:c.client||'—',
      tech:c.tech||'—',
      responsable:resp.nom||'—',
      date:c.date||'',
      envoi:wa?'WhatsApp':'Email',
      reserves:res,
      // Métrés → colonnes du registre (suivi de production / facturation)
      nbCar:t.nbCar, mlCar:t.mlCar,
      mlSci:t.mlSci, m2Sci:t.m2Sci,
      nbCb:t.nbCb,   mlCb:t.mlCb,
      nbOuv:t.nbOuvCar+t.nbOuvSci,
      m2Ouv:Math.round((t.m2OuvCar+t.m2OuvSci)*100)/100,
      niveaux:t.niveaux,
      photos:(S.photos||[]).length
    }
  };

  // 1. On sécurise d'abord : le rapport est enregistré AVANT toute tentative réseau
  try{
    await qAdd(item);
  }catch(e){
    // IndexedDB indisponible (navigation privée...) : envoi direct, sans filet
    console.error('File d\'attente indisponible:',e);
    try{
      await sendItem(item);
      alert(wa?'✅ Rapport archivé.\n\n👷 Copie envoyée à '+resp.nom:'✅ Rapport envoyé par email !\n\n📧 Client : '+emailTo+(emailCc?'\n👷 '+resp.nom+' : '+emailCc:''));
    }catch(err){
      alert('❌ Envoi impossible : '+err.message+'\n\nLe PDF va être téléchargé, envoyez-le depuis votre application mail.');
      _fallbackEmail(blob,filename,emailTo,emailCc,subject,corps);
    }
    return;
  }
  queueCount=(await qAll()).length;
  renderQueue();

  // 2. Puis on tente l'envoi tout de suite
  var btn=document.getElementById('btn-gen');
  if(!navigator.onLine){
    alert(wa
      ? '📴 Pas de réseau.\n\nLe PDF a été partagé sur WhatsApp depuis votre téléphone.\nL\'archivage (Drive + registre + copie '+resp.nom+') se fera TOUT SEUL dès que le téléphone captera.'
      : '📴 Pas de réseau.\n\nLe rapport N° '+item.meta.num+' est enregistré et partira TOUT SEUL dès que le téléphone captera.\n\n➡️ Vous pouvez fermer l\'appli et enchaîner le chantier suivant.');
    return;
  }
  if(btn)btn.textContent='⏳ Envoi en cours...';
  try{
    await sendItem(item);
    await qDel(item.id);
    queueCount=(await qAll()).length;renderQueue();
    alert(wa
      ? '✅ Rapport archivé (Drive + registre).\n\n👷 Copie envoyée à '+resp.nom+'\n💬 Le client le reçoit par WhatsApp.'
      : '✅ Rapport envoyé par email !\n\n📧 Client : '+emailTo+(emailCc?'\n👷 '+resp.nom+' : '+emailCc:''));
  }catch(err){
    console.error('Erreur envoi:',err);
    var it=await qGet(item.id);
    if(it){it.tries=1;it.lastError=err.message;it.lastTry=Date.now();try{await qPut(it);}catch(e){}}
    renderQueue();
    alert('⚠️ L\'envoi n\'a pas abouti ('+err.message+').\n\nLe rapport N° '+item.meta.num+' est conservé dans la file d\'attente et sera renvoyé automatiquement.\n\n➡️ Bandeau jaune en haut de l\'écran pour le suivre.');
  }
}

// ── FALLBACK : téléchargement + ouverture client mail ──
function _fallbackEmail(blob,filename,emailClient,emailResp,subject,corps){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
  var mailtoUrl='mailto:'+encodeURIComponent(emailClient)
    +(emailResp?'?cc='+encodeURIComponent(emailResp)+'&':'?')
    +'subject='+encodeURIComponent(subject)
    +'&body='+encodeURIComponent(corps+'\n\n(Veuillez joindre le fichier : '+filename+')');
  setTimeout(function(){window.open(mailtoUrl,'_self');},800);
  alert('📎 PDF téléchargé !\nVotre application mail va s\'ouvrir.\nJoignez le fichier "'+filename+'" avant d\'envoyer.');
}

// ── INIT ──
loadState();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
initModalEvents();
R();

/* ── DÉCLENCHEURS DE RENVOI AUTOMATIQUE ──
   La file est vidée : à l'ouverture de l'appli, au retour du réseau,
   quand le chef d'équipe revient sur l'appli, et toutes les 60 s. */
qAll().then(function(items){queueCount=items.length;renderQueue();if(items.length)flushQueue(true);});
refillReserve();
chargerChefs(); // liste du personnel à jour (onglet "Personnel" du registre)

window.addEventListener('online',function(){
  renderQueue();
  refillReserve();
  chargerChefs();
  flushQueue(); // notification si des rapports repartent
});
window.addEventListener('offline',renderQueue);

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&navigator.onLine)flushQueue(true);
});

setInterval(function(){
  if(queueCount&&navigator.onLine&&!flushing)flushQueue(true);
},60000);

// Avertit si le chef d'équipe ferme l'appli avec des rapports non envoyés
window.addEventListener('beforeunload',function(e){
  if(queueCount>0){e.preventDefault();e.returnValue='';}
});
</script>
