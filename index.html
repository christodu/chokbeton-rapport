<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CHOK'BETON — Rapport Chantier</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E2D35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHOK'BETON">
<style>
:root{--y:#F5C400;--dk:#1E2D35;--bg:#f1f5f9;--card:#fff;--text:#0f172a;--mut:#64748b;--brd:#e2e8f0;--r:12px;--sh:0 1px 4px rgba(0,0,0,.1);--ov:#7c3aed;--bl:#0284c7}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--dk);color:#fff;padding:12px 16px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.hdr-row{display:flex;align-items:center;gap:10px;padding-bottom:10px}
.hdr-info{flex:1}
.hdr-title{font-size:16px;font-weight:900;color:#fff}
.hdr-step{font-size:11px;color:var(--y);font-weight:700}
.steps-bar{display:flex;gap:5px;padding-bottom:9px}
.sd{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.18)}
.sd.on{background:var(--y)}.sd.was{background:rgba(245,196,0,.55)}
.body{flex:1;padding:14px;overflow-y:auto;padding-bottom:88px}
.card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:11px;box-shadow:var(--sh)}
.ct{font-size:11px;font-weight:900;color:var(--dk);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ct::after{content:'';flex:1;height:1px;background:var(--brd)}
.f{margin-bottom:12px}.f:last-child{margin-bottom:0}
label{display:block;font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--brd);border-radius:8px;font-size:16px;color:var(--text);background:#fff;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--dk)}
textarea{resize:vertical;min-height:70px}
.row{display:flex;gap:9px}.row .f{flex:1}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 16px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;min-height:50px}
.btn-p{background:var(--dk);color:#fff}
.btn-y{background:var(--y);color:var(--dk)}
.btn-o{background:transparent;color:var(--dk);border:2px solid var(--dk)}
.btn-wa{background:#0284c7;color:#fff}.btn-wa:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:8px 13px;font-size:13px;min-height:36px;width:auto}
.bot{padding:12px 14px;background:#fff;border-top:1px solid var(--brd);display:flex;gap:9px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:40}
/* Blocs */
.bloc{background:#fff;border:1.5px solid var(--brd);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.bloc-hdr{background:var(--dk);padding:10px 14px;display:flex;align-items:center;gap:8px}
.bloc-niv{background:var(--y);color:var(--dk);font-size:13px;font-weight:900;padding:4px 12px;border-radius:20px;white-space:nowrap}
.bloc-title{color:#fff;font-size:13px;font-weight:700;flex:1}
.bloc-del{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:2px}
.bloc-body{padding:12px 14px}
.work-row{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--brd)}
.work-row:last-child{border-bottom:none}
.work-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.work-txt{font-size:13px;flex:1;line-height:1.5}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;white-space:nowrap;display:inline-block;margin:1px}
.bp{background:#fef3c7;color:#92400e}.bv{background:#e0f2fe;color:#0369a1}
.bg{background:#f0fdf4;color:#166534}.bpoly{background:#ede9fe;color:#7c3aed}
/* Step 3 */
.rgrid{display:flex;flex-direction:column;gap:9px}
.rc{border:2px solid var(--brd);border-radius:10px;padding:13px 15px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:12px}
.rc.sel{border-color:var(--dk);background:#f0f4f5}
.rc-av{width:40px;height:40px;border-radius:50%;background:var(--y);color:var(--dk);font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rc.sel .rc-av{background:var(--dk);color:#fff}
.rc-info{flex:1}.rc-name{font-size:15px;font-weight:800}.rc-sub{font-size:12px;color:#25D366;font-weight:600}
/* Modal */
.ov-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.ov-bg.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:95vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
.ov-bg.show .modal{transform:translateY(0)}
.mhandle{width:34px;height:4px;background:#e2e8f0;border-radius:2px;margin:11px auto}
.msection{padding:0 14px;margin-bottom:4px}
.msec-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:2px solid var(--y);margin-bottom:10px}
.msec-title{font-size:14px;font-weight:900;color:var(--dk)}
.add-btn{background:var(--y);color:var(--dk);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer}
/* Grille niveaux */
.ngrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.nb{padding:9px 3px;border:2px solid var(--brd);border-radius:8px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.nb.sel{border-color:var(--dk);background:var(--y);color:var(--dk)}
/* Lignes travaux */
.work-line{background:#f8fafc;border:1.5px solid var(--brd);border-radius:10px;padding:10px;margin-bottom:8px}
.line-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.line-row:last-child{margin-bottom:0}
.counter{display:flex;align-items:center;border:1.5px solid var(--brd);border-radius:8px;overflow:hidden;flex-shrink:0}
.cbtn{width:34px;height:36px;border:none;background:#f0f0f0;font-size:20px;font-weight:700;cursor:pointer;color:var(--dk)}
.cbtn:active{background:var(--y)}
.cinp{width:38px;border:none;text-align:center;font-size:15px;font-weight:800;padding:0}
.mini-supp{display:flex;gap:6px}
.ms{flex:1;padding:7px 4px;border:2px solid var(--brd);border-radius:7px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.ms.sel-p{border-color:#d97706;background:#fef3c7;color:#92400e}
.ms.sel-v{border-color:#0284c7;background:#e0f2fe;color:#0369a1}
.del-btn{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;flex-shrink:0;padding:2px}
.inp-sm{padding:8px;border:1.5px solid var(--brd);border-radius:7px;font-size:14px}
.haut-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.haut-lbl{font-size:12px;font-weight:700;color:var(--mut);white-space:nowrap}
.haut-inp{flex:1;padding:7px;border:1.5px solid #0284c7;border-radius:7px;font-size:14px;background:#f0f9ff}
/* Ouvertures carottages */
.ouv-line{background:#faf5ff;border:1.5px solid #ddd6fe;border-left:4px solid var(--ov);border-radius:10px;padding:10px;margin-bottom:8px}
/* Ouvertures sciage */
.ouvs-line{background:#eff6ff;border:1.5px solid #bfdbfe;border-left:4px solid var(--bl);border-radius:10px;padding:10px;margin-bottom:8px}
.sub-hdr{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin:8px 0 6px}
.ouvc-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
/* Options orientation */
.srow{display:flex;gap:9px}
.sb{flex:1;padding:11px;border:2px solid var(--brd);border-radius:8px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.sb.sel{border-color:var(--dk);background:var(--y);color:var(--dk)}
/* Signature */
#sigc{width:100%;height:160px;border:2px solid var(--brd);border-radius:8px;touch-action:none;background:#fafafa;display:block;cursor:crosshair}
.empty{text-align:center;padding:36px 16px;color:var(--mut)}
.empty .e-ico{font-size:44px;margin-bottom:10px}
.info-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:11px 13px;font-size:13px;color:#166534}
/* Photos */
.photo-upload{border:2px dashed var(--brd);border-radius:10px;padding:18px;text-align:center;cursor:pointer;background:#fafafa}
.photo-upload input[type=file]{display:none}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f1f5f9}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block}
.ph-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ph-cap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);padding:3px 5px}
.ph-cap input{background:transparent;border:none;color:#fff;font-size:10px;width:100%;padding:0;outline:none}
/* Historique */
.hist-panel{display:none;background:#fff;border-bottom:2px solid var(--brd);max-height:50vh;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.15)}
</style></head>
<body>
<div class="app" id="app"></div>
<div class="ov-bg" id="ov"><div class="modal" id="modal"></div></div>

<script>
// ── URL Google Apps Script (à renseigner après déploiement) ──
// Suivez le fichier apps-script.gs fourni avec cette application
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZZpTk0huPOlvI6sbHC6dkBmXEVMUugNGZkzwGVI4GsrRrkIdMW8SpbBJDGKJNukiH-A/exec';

var EQUIPE=[
  {id:'christopher',nom:'Christopher',email:'christopher@chok-beton.fr'},
  {id:'christian',  nom:'Christian',  email:'christian@chok-beton.fr'},
  {id:'ghislain',   nom:'Ghislain',   email:'ghislain@chok-beton.fr'}
];
var NIVEAUX=['SS3','SS2','SS1','RDC','RDJ','R+1','R+2','R+3','R+4','R+5','R+6','R+7','R+8','R+9','R+10','Toiture'];
var DIAMS=[40,50,60,70,80,100,110,120,130,150,160,200,220,250,300,320,350,400,'Autre'];
var CB_TYPES=['S512','S812','S1012','S1512','WRAP'];

function LOGO(h){
  h=h||42;
  var pts='';
  for(var i=0;i<28;i++){
    var a=i*360/28;
    var c=function(x){return Math.cos(x*Math.PI/180);};
    var s=function(x){return Math.sin(x*Math.PI/180);};
    pts+='<polygon points="'+76*c(a-4)+','+76*s(a-4)+' '+88*c(a)+','+88*s(a)+' '+76*c(a+4)+','+76*s(a+4)+'" fill="#F5C400"/>';
  }
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" height="'+h+'"><g transform="translate(110,100)"><circle cx="0" cy="0" r="76" fill="#F5C400"/>'+pts+'<rect x="-28" y="-32" width="56" height="64" rx="3" fill="#1E2D35"/><polygon points="-20,-24 20,-24 20,-14 -8,14 20,14 20,24 -20,24 -20,14 8,-14 -20,-14" fill="white"/><polygon points="0,-24 20,-24 20,-14 0,-14" fill="#1E2D35"/><polygon points="-20,14 0,14 0,24 -20,24" fill="#1E2D35"/></g><text x="110" y="200" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="26" fill="#1E2D35" letter-spacing="1">CHOK\'BETON</text><rect x="20" y="212" width="180" height="4" rx="2" fill="#F5C400"/></svg>';
}

// ── FACTORIES ──
function newCar(){return {diam:100,nb:1,ep:'',supp:'',haut:'',diamCustom:'',etai:false,cp:false,polyane:false};}
function newSci(){return {ml:'',prof:'',supp:'',haut:'',etai:false,cp:false,polyane:false};}
function newCb(){return {type:'',nbl:'',ll:'',ori:'horizontal',polyane:false};}
function newOuv(){return {larg:'',long:'',supp:'',haut:'',etai:false,cp:false,polyane:false,carottages:[{diam:200,nb:1,ep:'',diamCustom:''}]};}
function newOuvSci(){return {haut:'',larg:'',nbBlocs:'',polyane:false,typeOuv:'',coupes:[{nb:'',ml:'',ep:''}],carottages:[]};}
function newCoupe(){return {nb:'',ml:'',ep:''};}
function newOuvSciCar(){return {diam:150,nb:1,ep:'',diamCustom:''};}

// ── STATE ──
var S={
  step:1,
  info:{date:new Date().toISOString().slice(0,10),num:'',addr:'',client:'',tech:'',date_debut:'',date_fin:'',email_client:''},
  blocs:[],resp:'',photos:[],
  sig:{url:'',name:''},
  m:{open:false,editId:null,niveau:'',obs:'',carottages:[],sciages:[],carbones:[],ouvertures:[],ouvsciages:[],autres:''}
};
var uid=1,sc,sx,drawing=false;

// ── PERSISTENCE ──
function saveState(){
  try{localStorage.setItem('cb_rapport',JSON.stringify({info:S.info,blocs:S.blocs,resp:S.resp,sig:{name:S.sig.name},step:S.step}));}catch(e){}
}
function loadState(){
  try{
    var d=localStorage.getItem('cb_rapport');if(!d)return;
    var p=JSON.parse(d);
    if(p.info)Object.assign(S.info,p.info);
    if(p.blocs)S.blocs=p.blocs;
    if(p.resp)S.resp=p.resp;
    if(p.sig&&p.sig.name)S.sig.name=p.sig.name;
    if(p.step)S.step=p.step;
    var mx=S.blocs.reduce(function(a,b){return Math.max(a,parseInt(b.id)||0);},0);uid=mx+1;
  }catch(e){}
}
function resetState(){
  if(!confirm('Démarrer un nouveau rapport ?\nLe rapport actuel sera effacé.'))return;
  localStorage.removeItem('cb_rapport');location.reload();
}

// ── HISTORIQUE ──
function saveToHistory(filename,c,resp,blocs,sig,photos){
  try{
    var hist=JSON.parse(localStorage.getItem('cb_historique')||'[]');
    hist.unshift({id:Date.now(),filename:filename,date:c.date,num:c.num||'—',addr:c.addr||'—',client:c.client||'—',tech:c.tech||'—',resp:resp.nom||'—',niveaux:blocs.length,createdAt:new Date().toISOString(),
      fullData:{info:JSON.parse(JSON.stringify(c)),blocs:JSON.parse(JSON.stringify(blocs)),sig:{name:sig.name,url:sig.url||''},photos:JSON.parse(JSON.stringify(photos||[]))}
    });
    if(hist.length>30)hist=hist.slice(0,30);
    localStorage.setItem('cb_historique',JSON.stringify(hist));
  }catch(e){
    try{
      var hist2=JSON.parse(localStorage.getItem('cb_historique')||'[]');
      hist2.unshift({id:Date.now(),filename:filename,date:c.date,num:c.num||'—',addr:c.addr||'—',client:c.client||'—',tech:c.tech||'—',resp:resp.nom||'—',niveaux:blocs.length,createdAt:new Date().toISOString(),
        fullData:{info:JSON.parse(JSON.stringify(c)),blocs:JSON.parse(JSON.stringify(blocs)),sig:{name:sig.name,url:''},photos:[]}
      });
      if(hist2.length>30)hist2=hist2.slice(0,30);
      localStorage.setItem('cb_historique',JSON.stringify(hist2));
    }catch(e2){}
  }
}
function loadHistory(){try{return JSON.parse(localStorage.getItem('cb_historique')||'[]');}catch(e){return [];}}
function deleteHistEntry(id){
  try{var h=loadHistory().filter(function(r){return r.id!==id;});localStorage.setItem('cb_historique',JSON.stringify(h));}catch(e){}
  showHistory();
}
function clearHistory(){
  if(!confirm('Supprimer tout l\'historique ?'))return;
  localStorage.removeItem('cb_historique');showHistory();
}
var histOpen=false;
function toggleHistory(){histOpen=!histOpen;showHistory();}
function showHistory(){
  var el=document.getElementById('hist-panel');if(!el)return;
  if(!histOpen){el.style.display='none';return;}
  el.style.display='block';
  var hist=loadHistory();
  function fd(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  if(!hist.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--mut);font-size:14px">Aucun rapport enregistré</div>';return;}
  el.innerHTML='<div style="padding:12px 14px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:800;color:var(--dk)">'+hist.length+' rapport(s)</span><button onclick="clearHistory()" style="background:none;border:none;color:#ef4444;font-size:12px;font-weight:700;cursor:pointer">🗑 Tout effacer</button></div>'
    +hist.map(function(r){return '<div style="padding:12px 14px;border-bottom:1px solid var(--brd)">'
      +'<div style="display:flex;align-items:flex-start;gap:10px"><div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:800;color:var(--dk);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">N°'+r.num+' — '+r.addr+'</div>'
      +'<div style="font-size:12px;color:var(--mut);margin-top:2px">'+fd(r.date)+' · '+r.client+' · '+r.resp+'</div>'
      +'<div style="font-size:11px;color:var(--mut);margin-top:1px">'+r.niveaux+' niveau(x) · '+r.tech+'</div>'
      +'</div><button onclick="deleteHistEntry('+r.id+')" style="background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;flex-shrink:0;padding:2px">🗑</button></div>'
      +'<div style="display:flex;gap:8px;margin-top:9px">'
      +'<button onclick="regenPDF('+r.id+')" style="flex:1;padding:8px;background:var(--dk);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">📄 Régénérer PDF</button>'
      +'<button onclick="restoreReport('+r.id+')" style="flex:1;padding:8px;background:var(--y);color:var(--dk);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">✏️ Modifier</button>'
      +'</div></div>';
    }).join('');
}
function restoreReport(id){
  if(!confirm('Charger ce rapport ?\nLe rapport en cours sera remplacé.'))return;
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  Object.assign(S.info,r.fullData.info);
  S.blocs=JSON.parse(JSON.stringify(r.fullData.blocs));
  S.sig={name:r.fullData.sig.name,url:r.fullData.sig.url||''};
  S.photos=JSON.parse(JSON.stringify(r.fullData.photos||[]));
  S.resp='';S.step=1;histOpen=false;saveState();R();
  alert('Rapport chargé !');
}
async function regenPDF(id){
  var r=loadHistory().find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  var respObj=EQUIPE.find(function(e){return e.nom===r.resp;})||{nom:r.resp,email:''};
  try{
    var blob=await buildPDFFromData(r.fullData.info,r.fullData.blocs,r.fullData.sig,r.fullData.photos||[],respObj,r.filename);
    await envoyerParEmail(blob,r.filename,r.fullData.info,respObj);
  }catch(e){alert('Erreur : '+e.message);}
}

// ── TOGGLES (onclick direct) ──
function togCarEtai(i){if(S.m.carottages[i]){saveModalFields();S.m.carottages[i].etai=!S.m.carottages[i].etai;renderModal();}}
function togCarCp(i){if(S.m.carottages[i]){saveModalFields();S.m.carottages[i].cp=!S.m.carottages[i].cp;renderModal();}}
function togCarPoly(i){if(S.m.carottages[i]){saveModalFields();S.m.carottages[i].polyane=!S.m.carottages[i].polyane;renderModal();}}
function togSciEtai(i){if(S.m.sciages[i]){saveModalFields();S.m.sciages[i].etai=!S.m.sciages[i].etai;renderModal();}}
function togSciCp(i){if(S.m.sciages[i]){saveModalFields();S.m.sciages[i].cp=!S.m.sciages[i].cp;renderModal();}}
function togSciPoly(i){if(S.m.sciages[i]){saveModalFields();S.m.sciages[i].polyane=!S.m.sciages[i].polyane;renderModal();}}
function togCbPoly(i){if(S.m.carbones[i]){saveModalFields();S.m.carbones[i].polyane=!S.m.carbones[i].polyane;renderModal();}}
function togOuvEtai(i){if(S.m.ouvertures[i]){saveModalFields();S.m.ouvertures[i].etai=!S.m.ouvertures[i].etai;renderModal();}}
function togOuvCp(i){if(S.m.ouvertures[i]){saveModalFields();S.m.ouvertures[i].cp=!S.m.ouvertures[i].cp;renderModal();}}

function protBadges(item){

  if(item.cp)b+=' <span class="badge bg">🪵 Ferm.CP</span>';

  return b;
}

function step2(){
  if(!S.blocs.length)return '<div class="empty"><div class="e-ico">🏗️</div><p>Aucun niveau saisi.<br>Appuyez sur <strong>+ Ajouter un niveau</strong>.</p></div>';
  return S.blocs.map(function(b){return blocHtml(b);}).join('');
}

function blocHtml(b){
  var rows=[];
  (b.carottages||[]).forEach(function(l){
    var sup=l.supp==='plancher'?'<span class="badge bp">Plancher</span>':'<span class="badge bv">Voile</span>';
    var hi=l.supp==='voile'&&l.haut?' ↕'+l.haut+'ml':'';
    rows.push('<div class="work-row"><span class="work-ico">🔩</span><div class="work-txt"><b>'+l.nb+'×</b> '+dLbl(l.diam,l.diamCustom)+(l.ep?' ép.'+l.ep+'cm':'')+hi+' '+sup+protBadges(l)+'</div></div>');
  });
  (b.sciages||[]).forEach(function(l){
    var sup=l.supp==='plancher'?'<span class="badge bp">Plancher</span>':'<span class="badge bv">Voile</span>';
    var hi=l.supp==='voile'&&l.haut?' ↕'+l.haut+'ml':'';
    rows.push('<div class="work-row"><span class="work-ico">🪚</span><div class="work-txt"><b>'+l.ml+'ml</b>'+(l.prof?' prof.'+l.prof+'cm':'')+hi+' '+sup+protBadges(l)+'</div></div>');
  });
  (b.carbones||[]).forEach(function(l){
    rows.push('<div class="work-row"><span class="work-ico">🏗️</span><div class="work-txt"><b>'+l.nbl+' lam.</b> ×'+l.ll+'ml'+(l.type?' '+l.type:'')+' '+l.ori+(l.polyane?' <span class="badge bpoly">🛡️ Polyane</span>':'')+'</div></div>');
  });
  (b.ouvertures||[]).forEach(function(o){
    var sup=o.supp==='plancher'?'<span class="badge bp">Plancher</span>':o.supp==='voile'?'<span class="badge bv">Voile</span>':'';
    var hi=o.supp==='voile'&&o.haut?' ↕'+o.haut+'ml':'';
    var dim=o.larg&&o.long?o.larg+'×'+o.long+'cm':'—';
    var cars=(o.carottages||[]).filter(function(c){return c.nb>0;}).map(function(c){return c.nb+'×'+dLbl(c.diam,c.diamCustom)+(c.ep?' ép.'+c.ep+'cm':'');}).join(' / ');
    rows.push('<div class="work-row"><span class="work-ico">🔲</span><div class="work-txt" style="color:var(--ov)"><b>Ouv. carottages '+dim+'</b>'+hi+' '+sup+protBadges(o)+(cars?'<br><span style="color:var(--text);font-size:12px">'+cars+'</span>':'')+'</div></div>');
  });
  (b.ouvsciages||[]).forEach(function(o){
    var dim=o.haut&&o.larg?o.haut+'m × '+o.larg+'m':'—';
    var coupes=(o.coupes||[]).filter(function(c){return c.ml;}).map(function(c){return (c.nb?c.nb+'× ':'')+c.ml+'m ép.'+c.ep+'cm';}).join(' / ');
    var cars=(o.carottages||[]).filter(function(c){return c.nb>0;}).map(function(c){return c.nb+'×'+dLbl(c.diam,c.diamCustom)+(c.ep?' ép.'+c.ep+'cm':'');}).join(' / ');
    var typeOuvBadge=o.typeOuv==='porte'?'<span class="badge" style="background:#fce7f3;color:#9d174d">🚪 Porte</span>':o.typeOuv==='agrandissement'?'<span class="badge" style="background:#ecfdf5;color:#065f46">🔲 Agrandissement</span>':'';rows.push('<div class="work-row"><span class="work-ico">🔳</span><div class="work-txt" style="color:var(--bl)"><b>Ouv. sciage '+dim+'</b>'+(o.nbBlocs?' ('+o.nbBlocs+' blocs)':'')+' '+typeOuvBadge+(o.polyane?' <span class="badge bpoly">🛡️ Polyane</span>':'')+(coupes?'<br><span style="color:var(--text);font-size:12px">✂️ '+coupes+'</span>':'')+(cars?'<br><span style="color:var(--text);font-size:12px">🔩 '+cars+'</span>':'')+'</div></div>');
  });
  if(b.autres)rows.push('<div class="work-row"><span class="work-ico">📝</span><div class="work-txt">'+b.autres+'</div></div>');
  if(b.obs)rows.push('<div class="work-row"><span class="work-ico">💬</span><div class="work-txt" style="color:var(--mut)">'+b.obs+'</div></div>');
  var total=(b.carottages||[]).length+(b.sciages||[]).length+(b.carbones||[]).length+(b.ouvertures||[]).length+(b.ouvsciages||[]).length+(b.autres?1:0);
  return '<div class="bloc"><div class="bloc-hdr">'
    +'<span class="bloc-niv">📍 '+(b.niveau||'—')+'</span>'
    +'<span class="bloc-title">'+total+' travaux réalisé'+(total>1?'s':'')+'</span>'
    +'<button class="bloc-del" onclick="editBloc(\''+b.id+'\')" style="font-size:16px;margin-right:2px">✏️</button>'
    +'<button class="bloc-del" onclick="delBloc(\''+b.id+'\')">🗑</button>'
    +'</div><div class="bloc-body">'+(rows.join('')||'<p style="color:var(--mut);font-size:13px">Aucun travail</p>')+'</div></div>';
}

  return '<div class="card"><div class="ct">📊 Récapitulatif</div>'+recap+'</div>'
    +'<div class="card"><div class="ct">📧 Destinataires du rapport</div>'
    +'<div class="f"><label>Email du client <span style="color:#ef4444">*</span></label><input type="email" id="f-email-client" value="'+(S.info.email_client||'')+'" placeholder="client@exemple.fr"></div>'
    +'<div style="font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 8px">Responsable du chantier <span style="font-weight:400;text-transform:none;font-size:11px">(recevra aussi le rapport)</span></div>'
    +'<div class="rgrid">'+respCards+'</div>'
    +'</div>'
    +'<div class="card"><div class="ct">📸 Photos <span style="font-weight:400;text-transform:none;font-size:10px">(max 10)</span></div>'+photoGrid
    +(S.photos.length<10?'<label class="photo-upload"><input type="file" accept="image/*" multiple onchange="addPhotos(this)"><div style="font-size:32px;margin-bottom:6px">📷</div><div style="font-size:13px;color:var(--mut);font-weight:600">Ajouter des photos</div></label>':'')
    +'</div>'
    +'<div class="card"><div class="ct">✍️ Signature client</div>'
    +'<div class="f"><label>Nom du signataire</label><input type="text" id="f-signame" value="'+S.sig.name+'" placeholder="Prénom Nom"></div>'
    +'<div class="f"><label>Signature</label><canvas id="sigc" width="800" height="300"></canvas>'
    +'<button class="btn btn-o btn-sm" style="margin-top:8px" onclick="clearSig()">🗑 Effacer</button></div></div>'
    +'<div class="info-box">📧 Le rapport PDF sera envoyé par email au client et au responsable sélectionné</div>';
}

function addPhotos(input){
  var files=Array.from(input.files),rem=10-S.photos.length,toAdd=files.slice(0,rem);
  if(!toAdd.length)return;
  var done=0,total=toAdd.length;
  toAdd.forEach(function(f){
    var objUrl=URL.createObjectURL(f);
    var img=new Image();
    img.onload=function(){
      // Le navigateur applique automatiquement la rotation EXIF via drawImage
      var cv=document.createElement('canvas');
      cv.width=img.naturalWidth;cv.height=img.naturalHeight;
      cv.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(objUrl);
      S.photos.push({url:cv.toDataURL('image/jpeg',0.85),caption:''});
      if(++done===total)R();
    };
    img.onerror=function(){
      // Fallback si createObjectURL échoue
      URL.revokeObjectURL(objUrl);
      var r=new FileReader();
      r.onload=function(e){S.photos.push({url:e.target.result,caption:''});if(++done===total)R();};
      r.readAsDataURL(f);
    };
    img.src=objUrl;
  });
}
function delPhoto(i){S.photos.splice(i,1);R();}
function selResp(id){var sn=document.getElementById('f-signame');if(sn)S.sig.name=sn.value;if(sc)S.sig.url=sc.toDataURL();S.resp=id;R();}
function delBloc(id){if(!confirm('Supprimer ce niveau ?'))return;S.blocs=S.blocs.filter(function(x){return x.id!==id;});R();}

function bot(){

  return '<div class="bot"><button class="btn btn-o btn-sm" onclick="go(2)">← Retour</button><button class="btn btn-wa" id="btn-gen" style="flex:1;background:#0284c7" onclick="generate()">📧 Générer & Envoyer par email</button></div>';
}

// ── SAVE MODAL FIELDS ──
function saveModalFields(){
  var m=S.m;
  function gv(id){var e=document.getElementById(id);return e?e.value:null;}
  var obs=document.getElementById('m-obs');if(obs)m.obs=obs.value;
  var aut=document.getElementById('m-autres');if(aut)m.autres=aut.value;
  (m.carottages||[]).forEach(function(l,i){
    var d=gv('car-d-'+i);if(d)l.diam=d;
    var dc=gv('car-dc-'+i);if(dc!==null)l.diamCustom=dc;
    var n=gv('car-n-'+i);if(n)l.nb=Math.max(1,parseInt(n)||1);
    var e=gv('car-e-'+i);if(e!==null)l.ep=e;
    var h=gv('car-h-'+i);if(h!==null)l.haut=h;
  });
  (m.sciages||[]).forEach(function(l,i){
    var ml=gv('sci-ml-'+i);if(ml)l.ml=ml;
    var pr=gv('sci-pr-'+i);if(pr!==null)l.prof=pr;
    var h=gv('sci-h-'+i);if(h!==null)l.haut=h;
  });
  (m.carbones||[]).forEach(function(l,i){
    var t=gv('cb-t-'+i);if(t!==null)l.type=t;
    var n=gv('cb-n-'+i);if(n)l.nbl=n;
    var ll=gv('cb-l-'+i);if(ll)l.ll=ll;
  });
  (m.ouvertures||[]).forEach(function(o,i){
    var la=gv('ouv-la-'+i);if(la)o.larg=la;
    var lo=gv('ouv-lo-'+i);if(lo)o.long=lo;
    var h=gv('ouv-h-'+i);if(h!==null)o.haut=h;
    (o.carottages||[]).forEach(function(c,ci){
      var d=gv('ouvc-d-'+i+'-'+ci);if(d)c.diam=d;
      var dc=gv('ouvc-dc-'+i+'-'+ci);if(dc!==null)c.diamCustom=dc;
      var n=gv('ouvc-n-'+i+'-'+ci);if(n)c.nb=Math.max(1,parseInt(n)||1);
      var e=gv('ouvc-e-'+i+'-'+ci);if(e!==null)c.ep=e;
    });
  });
  (m.ouvsciages||[]).forEach(function(o,i){
    var h=gv('ouvs-h-'+i);if(h!==null)o.haut=h;
    var l=gv('ouvs-l-'+i);if(l!==null)o.larg=l;
    var b=gv('ouvs-blocs-'+i);if(b!==null)o.nbBlocs=b;
    (o.coupes||[]).forEach(function(cp,ci){
      var nb=gv('ouvs-cnb-'+i+'-'+ci);if(nb!==null)cp.nb=nb;
      var ml=gv('ouvs-cml-'+i+'-'+ci);if(ml!==null)cp.ml=ml;
      var ep=gv('ouvs-cep-'+i+'-'+ci);if(ep!==null)cp.ep=ep;
    });
    (o.carottages||[]).forEach(function(c,ci){
      var d=gv('ouvsc-d-'+i+'-'+ci);if(d)c.diam=d;
      var dc=gv('ouvsc-dc-'+i+'-'+ci);if(dc!==null)c.diamCustom=dc;
      var n=gv('ouvsc-n-'+i+'-'+ci);if(n)c.nb=Math.max(1,parseInt(n)||1);
      var e=gv('ouvsc-e-'+i+'-'+ci);if(e!==null)c.ep=e;
    });
  });
}

// ── EVENT DELEGATION ──
function initModalEvents(){
  var modal=document.getElementById('modal');
  var ov=document.getElementById('ov');
  ov.addEventListener('click',function(e){if(e.target===this)closeM();});
  modal.addEventListener('click',function(e){
    var el=e.target.closest('[data-c]');
    if(!el)return;
    e.stopPropagation();
    saveModalFields();
    var c=el.dataset.c,i=parseInt(el.dataset.i||0),j=parseInt(el.dataset.j||0),v=el.dataset.v||'';
    if(c==='close'){closeM();return;}
    if(c==='save'){saveBloc();return;}
    if(c==='niv'){S.m.niveau=S.m.niveau===v?'':v;}
    // Carottages
    else if(c==='car-add')S.m.carottages.push(newCar());
    else if(c==='car-del')S.m.carottages.splice(i,1);
    else if(c==='car-nb+')S.m.carottages[i].nb=Math.max(1,(S.m.carottages[i].nb||1)+1);
    else if(c==='car-nb-')S.m.carottages[i].nb=Math.max(1,(S.m.carottages[i].nb||1)-1);
    else if(c==='car-supp')S.m.carottages[i].supp=v;
    // Sciages
    else if(c==='sci-add')S.m.sciages.push(newSci());
    else if(c==='sci-del')S.m.sciages.splice(i,1);
    else if(c==='sci-supp')S.m.sciages[i].supp=v;
    // Carbones
    else if(c==='cb-add')S.m.carbones.push(newCb());
    else if(c==='cb-del')S.m.carbones.splice(i,1);
    else if(c==='cb-ori')S.m.carbones[i].ori=v;
    // Ouvertures carottages
    else if(c==='ouv-add')S.m.ouvertures.push(newOuv());
    else if(c==='ouv-del')S.m.ouvertures.splice(i,1);
    else if(c==='ouv-supp')S.m.ouvertures[i].supp=v;
    else if(c==='ouvc-add')(S.m.ouvertures[i].carottages=S.m.ouvertures[i].carottages||[]).push({diam:200,nb:1,ep:'',diamCustom:''});
    else if(c==='ouvc-del')S.m.ouvertures[i].carottages.splice(j,1);
    else if(c==='ouvc-nb+')S.m.ouvertures[i].carottages[j].nb=Math.max(1,(S.m.ouvertures[i].carottages[j].nb||1)+1);
    else if(c==='ouvc-nb-')S.m.ouvertures[i].carottages[j].nb=Math.max(1,(S.m.ouvertures[i].carottages[j].nb||1)-1);
    // Ouvertures sciage
    else if(c==='ouvs-add')S.m.ouvsciages.push(newOuvSci());
    else if(c==='ouvs-del')S.m.ouvsciages.splice(i,1);
    else if(c==='ouvs-cadd')(S.m.ouvsciages[i].coupes=S.m.ouvsciages[i].coupes||[]).push(newCoupe());
    else if(c==='ouvs-cdel')S.m.ouvsciages[i].coupes.splice(j,1);
    else if(c==='ouvsc-add')(S.m.ouvsciages[i].carottages=S.m.ouvsciages[i].carottages||[]).push(newOuvSciCar());
    else if(c==='ouvsc-del')S.m.ouvsciages[i].carottages.splice(j,1);
    else if(c==='ouvsc-nb+')S.m.ouvsciages[i].carottages[j].nb=Math.max(1,(S.m.ouvsciages[i].carottages[j].nb||1)+1);
    else if(c==='ouvsc-nb-')S.m.ouvsciages[i].carottages[j].nb=Math.max(1,(S.m.ouvsciages[i].carottages[j].nb||1)-1);
    renderModal();
  });
  modal.addEventListener('change',function(e){
    var el=e.target,ch=el.dataset.ch;if(!ch)return;
    saveModalFields();
    var i=parseInt(el.dataset.i||0),j=parseInt(el.dataset.j||0);
    if(ch==='car-diam'){S.m.carottages[i].diam=el.value;renderModal();}
    else if(ch==='ouvc-diam'){S.m.ouvertures[i].carottages[j].diam=el.value;renderModal();}
    else if(ch==='ouvsc-diam'){S.m.ouvsciages[i].carottages[j].diam=el.value;renderModal();}
    else if(ch==='cb-type'){S.m.carbones[i].type=el.value;}
  });
}

// ── SAVE BLOC ──
function saveBloc(){
  saveModalFields();var m=S.m;
  var hasWork=(m.carottages||[]).length>0||(m.sciages||[]).length>0||(m.carbones||[]).length>0||(m.ouvertures||[]).length>0||(m.ouvsciages||[]).length>0||m.autres;
  if(!hasWork){alert('Ajoutez au moins un travail.');return;}
  for(var i=0;i<(m.carottages||[]).length;i++){if(!m.carottages[i].supp){alert('Choisissez Plancher ou Voile pour chaque carottage.');return;}}
  for(var i=0;i<(m.sciages||[]).length;i++){if(!m.sciages[i].ml){alert('Saisissez la longueur pour chaque sciage.');return;}if(!m.sciages[i].supp){alert('Choisissez Plancher ou Voile pour chaque sciage.');return;}}
  for(var i=0;i<(m.carbones||[]).length;i++){if(!m.carbones[i].nbl||!m.carbones[i].ll){alert('Renseignez nb et longueur pour chaque lamelle.');return;}}
  for(var i=0;i<(m.ouvertures||[]).length;i++){if(!m.ouvertures[i].larg||!m.ouvertures[i].long){alert('Saisissez les dimensions de chaque ouverture par carottages.');return;}if(!m.ouvertures[i].supp){alert('Choisissez Plancher ou Voile pour chaque ouverture.');return;}}
  for(var i=0;i<(m.ouvsciages||[]).length;i++){if(!m.ouvsciages[i].haut||!m.ouvsciages[i].larg){alert('Saisissez les dimensions de chaque ouverture par sciage.');return;}}
  var data={niveau:m.niveau||'Non précisé',obs:m.obs,autres:m.autres,
    carottages:JSON.parse(JSON.stringify(m.carottages)),
    sciages:JSON.parse(JSON.stringify(m.sciages)),
    carbones:JSON.parse(JSON.stringify(m.carbones)),
    ouvertures:JSON.parse(JSON.stringify(m.ouvertures)),

// ── SIGNATURE ──
function initSig(){
  var cv=document.getElementById('sigc');if(!cv)return;
  sc=cv;sx=cv.getContext('2d');sx.strokeStyle='#1E2D35';sx.lineWidth=3;sx.lineCap='round';sx.lineJoin='round';
  if(S.sig.url){var img=new Image();img.onload=function(){sx.drawImage(img,0,0,cv.width,cv.height);};img.src=S.sig.url;}
  function pos(e){var r=cv.getBoundingClientRect(),sw=cv.width/r.width,sh=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sw,y:(s.clientY-r.top)*sh};}
  cv.addEventListener('mousedown',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);});
  cv.addEventListener('mousemove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();});
  cv.addEventListener('mouseup',function(){drawing=false;if(sc)S.sig.url=sc.toDataURL();});
  cv.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);},{passive:false});
  cv.addEventListener('touchmove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();},{passive:false});
  cv.addEventListener('touchend',function(){drawing=false;if(sc)S.sig.url=sc.toDataURL();});
}
function clearSig(){if(sc&&sx){sx.clearRect(0,0,sc.width,sc.height);S.sig.url='';}}

function events(){
  if(S.step===1){
    [['date','date'],['num','num'],['addr','addr'],['client','client'],['tech','tech'],['date-debut','date_debut'],['date-fin','date_fin']].forEach(function(pair){
      var el=document.getElementById('f-'+pair[0]);if(el)el.addEventListener('input',function(ev){S.info[pair[1]]=ev.target.value;});
    });
  }
  if(S.step===3){
    var sn=document.getElementById('f-signame');if(sn)sn.addEventListener('input',function(e){S.sig.name=e.target.value;});
    var ec=document.getElementById('f-email-client');if(ec)ec.addEventListener('input',function(e){S.info.email_client=e.target.value.trim();});
    setTimeout(initSig,50);
  }
}
function go(step){
  if(S.step===1&&step===2){
    var c=S.info;
    var manquants=[];
    if(!c.num||!c.num.trim())manquants.push('N° de rapport');
    if(!c.addr||!c.addr.trim())manquants.push('Adresse / Nom du chantier');
    if(!c.client||!c.client.trim())manquants.push('Client');
    if(!c.tech||!c.tech.trim())manquants.push('Nom du technicien');
    if(manquants.length){alert('⚠️ Champs obligatoires manquants :\n• '+manquants.join('\n• '));return;}
  }
  if(S.step===3){var sn=document.getElementById('f-signame');if(sn)S.sig.name=sn.value;if(sc)S.sig.url=sc.toDataURL();}
  S.step=step;R();window.scrollTo(0,0);
}

// ── GENERATE ──
async function generate(){
  // Récupérer l'email client avant validation
  var ecEl=document.getElementById('f-email-client');
  if(ecEl)S.info.email_client=ecEl.value.trim();
  if(!S.resp){alert('⚠️ Veuillez sélectionner le responsable du chantier.');return;}
  if(!S.info.email_client){alert('⚠️ Veuillez renseigner l\'email du client.');return;}
  var emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!emailRegex.test(S.info.email_client)){alert('⚠️ L\'adresse email du client n\'est pas valide.');return;}
  var sn=document.getElementById('f-signame');if(sn)S.sig.name=sn.value;if(sc)S.sig.url=sc.toDataURL();
  var btn=document.getElementById('btn-gen');if(btn){btn.textContent='⏳ Génération PDF...';btn.disabled=true;}
  try{
    var c=S.info,sig=S.sig,resp=EQUIPE.find(function(x){return x.id===S.resp;})||{nom:'—',email:''};
    var filename='rapport-chokbeton-'+(c.date||'chantier')+'-'+(c.num||'001').replace(/[^a-zA-Z0-9]/g,'_')+'.pdf';
    saveToHistory(filename,c,resp,S.blocs,sig,S.photos);
    var blob=await buildPDFFromData(c,S.blocs,sig,S.photos,resp,filename);
    await envoyerParEmail(blob,filename,c,resp);
  }catch(e){alert('Erreur : '+e.message);}
  finally{if(btn){btn.textContent='📧 Générer & Envoyer par email';btn.disabled=false;}}
}

    // Nom société en jaune
    doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,YEL);
    doc.text("CHOK'BETON",M+2,PH-7.5);
    // Adresse en gris clair
    doc.setFontSize(6.5);doc.setFont('helvetica','normal');set(null,null,[180,195,200]);
    doc.text('1 Rue Hector Berlioz  |  95210 SAINT GRATIEN',M+2,PH-3);
    // Numéro de rapport + responsable centré
    doc.setFontSize(6.5);set(null,null,[180,195,200]);
    doc.text('N '+String(c.num||'—')+'  |  Resp. '+resp.nom+'  |  Généré le '+now.toLocaleDateString('fr-FR'),PW/2,PH-7.5,{align:'center'});
    // Pagination à droite en jaune
    doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,YEL);
    doc.text('Page '+p+'/'+total,PW-M,PH-7.5,{align:'right'});
    doc.setFontSize(6);doc.setFont('helvetica','normal');set(null,null,[180,195,200]);
    doc.text('RAPPORT CONFIDENTIEL',PW-M,PH-3,{align:'right'});
  }

  return doc.output('blob');
}

// ── ENVOI PAR EMAIL VIA GOOGLE APPS SCRIPT ──
async function envoyerParEmail(blob,filename,c,resp){
  var emailClient=c.email_client||'';
  var emailResp=resp.email||'';
  var fd=function(d){if(!d)return'-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];};
  var subject="Rapport CHOK BETON - N "+(c.num||'-')+" - "+(c.addr||'-');
  var corps="Bonjour,\n\nVeuillez trouver ci-joint le rapport de chantier CHOK BETON.\n\n"
    +"Chantier : "+(c.addr||'-')+"\n"
    +"Date : "+fd(c.date)+"\n"
    +"N de rapport : "+(c.num||'-')+"\n"
    +"Technicien : "+(c.tech||'-')+"\n"
    +(c.client?"Client : "+c.client+"\n":"")+"\n"
    +"Cordialement,\nL'equipe CHOK BETON\n"
    +"1 Rue Hector Berlioz - 95210 SAINT GRATIEN";

  // Vérification que l'URL Apps Script est configurée
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==='COLLER_ICI_VOTRE_URL_APPS_SCRIPT'){
    // Fallback si Apps Script pas encore configuré : téléchargement + mail natif
    _fallbackEmail(blob,filename,emailClient,emailResp,subject,corps);
    return;
  }

  // Conversion du PDF en base64
  var btn=document.getElementById('btn-gen');
  if(btn)btn.textContent='⏳ Envoi en cours...';
  var base64=await new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(){resolve(reader.result.split(',')[1]);};
    reader.onerror=reject;
    reader.readAsDataURL(blob);
  });

  var payload={
    // Destinataires
    to:emailClient,
    cc:emailResp,
    // Contenu email
    subject:subject,
    body:corps,
    filename:filename,
    pdf:base64,
    // Données pour archivage (Drive + Sheets)
    num:c.num||'—',
    addr:c.addr||'—',
    client:c.client||'—',
    tech:c.tech||'—',
    responsable:resp.nom||'—',
    date:c.date||''
  };

  try{
    // Envoi via Google Apps Script (Content-Type text/plain évite le preflight CORS)
    await fetch(APPS_SCRIPT_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(payload)
    });
    // En mode no-cors on ne peut pas lire la réponse, mais l'envoi s'effectue
    alert('✅ Rapport envoyé par email !\n\n📧 Client : '+emailClient+'\n👷 '+resp.nom+' : '+emailResp);
  }catch(err){
    console.error('Erreur envoi:',err);
    alert('⚠️ Impossible d\'envoyer automatiquement.\nTentative d\'envoi via votre application mail...');
    _fallbackEmail(blob,filename,emailClient,emailResp,subject,corps);
  }
}

// ── FALLBACK : téléchargement + ouverture client mail ──
function _fallbackEmail(blob,filename,emailClient,emailResp,subject,corps){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
  var mailtoUrl='mailto:'+encodeURIComponent(emailClient)
    +(emailResp?'?cc='+encodeURIComponent(emailResp)+'&':'?')
    +'subject='+encodeURIComponent(subject)
    +'&body='+encodeURIComponent(corps+'\n\n(Veuillez joindre le fichier : '+filename+')');
  setTimeout(function(){window.open(mailtoUrl,'_self');},800);
  alert('📎 PDF téléchargé !\nVotre application mail va s\'ouvrir.\nJoignez le fichier "'+filename+'" avant d\'envoyer.');
}
